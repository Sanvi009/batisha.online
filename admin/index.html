<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Admin · Batisha online</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fcfcfc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      margin: 0;
      color: #1e2b3a;
    }

    /* ----- CARD (clean, white, matches site) ----- */
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #eef2f6;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      transition: all 0.2s ease;
    }

    /* ----- LOGO (matches home) ----- */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: #1f2a3a;
      margin-bottom: 1.8rem;
      justify-content: center;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #1e6b3e, #2b7a4a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(30, 107, 62, 0.12);
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
      display: block;
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1f2a3a;
    }
    .logo-text span {
      font-weight: 400;
      color: #4b6b5e;
      font-size: 0.8rem;
      margin-left: 0.1rem;
    }

    /* ----- header ----- */
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .admin-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f0f8f2;
      border-radius: 40px;
      padding: 0.3rem 1.2rem;
      margin-bottom: 0.8rem;
      border: 1px solid #dce8e2;
    }
    .admin-badge span {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: #1f8b4c;
      text-transform: uppercase;
    }
    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #1a3428;
      margin-bottom: 0.2rem;
    }
    .card-header p {
      color: #4b5f53;
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* ----- form ----- */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .input-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1a3428;
      margin-left: 0.1rem;
    }
    .input-field {
      background: #f8fbf9;
      border: 1px solid #dde5ed;
      border-radius: 12px;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      color: #1e2b3a;
      outline: none;
      transition: 0.15s ease;
      font-family: inherit;
      width: 100%;
    }
    .input-field:focus {
      border-color: #1f8b4c;
      box-shadow: 0 0 0 3px rgba(31, 139, 76, 0.08);
      background: #ffffff;
    }
    .input-field::placeholder {
      color: #8b9e92;
      font-weight: 400;
      font-size: 0.9rem;
    }

    /* ----- error message ----- */
    .error-message {
      background: #fef2f2;
      border-left: 4px solid #dc2626;
      color: #991b1b;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.2rem;
      transition: opacity 0.2s;
    }
    .hidden {
      display: none;
    }

    /* ----- login button (matches site) ----- */
    .login-btn {
      background: #1f8b4c;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0.7rem 1.8rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s ease;
      margin-top: 0.3rem;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.15);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .login-btn:hover {
      background: #0f6e3a;
      transform: scale(1.01);
      box-shadow: 0 6px 16px rgba(31, 139, 76, 0.2);
    }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ----- spinner ----- */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ----- session hint (subtle) ----- */
    .session-hint {
      text-align: center;
      font-size: 0.7rem;
      color: #6b8780;
      margin-top: 1.2rem;
      border-top: 1px solid #eef2f6;
      padding-top: 1rem;
    }

    @media (max-width: 450px) {
      .login-card {
        padding: 2rem 1.5rem;
        border-radius: 16px;
      }
      .card-header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <!-- LOGO (matches home) -->
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 10v-2a6 6 0 0 1 12 0v2h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2h4zm2 0h8v-2a4 4 0 0 0-8 0v2zm-2 2v2h2v-2h-2zm4 0v2h4v-2h-4zm8 0v2h2v-2h-2zM8 14v2h2v-2H8zm16 0v2h2v-2h-2zM8 18v8h16v-8H8z"/>
        </svg>
      </div>
      <span class="logo-text">Batisha <span>online</span></span>
    </a>

    <div class="card-header">
      <div class="admin-badge">
        <span>🔐 admin</span>
      </div>
      <h1>Staff login</h1>
      <p>Secure access to grocery hub</p>
    </div>

    <form id="loginForm" class="login-form" autocomplete="off">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="input-field" placeholder="Enter admin username" autocomplete="off" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="input-field" placeholder="········" autocomplete="off" required>
      </div>

      <div id="loginError" class="error-message hidden">
        <span>⚠️</span> <span id="errorText">Invalid credentials</span>
      </div>

      <button type="submit" id="loginButton" class="login-btn">
        <span id="btnText">→ Log in</span>
      </button>
    </form>

    <div class="session-hint">
      🔒 Environment variables active
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // DOM elements
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginButton = document.getElementById('loginButton');
      const btnText = document.getElementById('btnText');
      const loginErrorDiv = document.getElementById('loginError');
      const errorTextSpan = document.getElementById('errorText');

      const SESSION_KEY = 'grocery_admin_session';
      const DASHBOARD_PATH = '/admin/dashboard';

      function checkExistingSession() {
        try {
          const sessionData = localStorage.getItem(SESSION_KEY);
          if (sessionData) {
            const parsed = JSON.parse(sessionData);
            if (parsed && parsed.loggedIn === true && parsed.timestamp) {
              window.location.href = DASHBOARD_PATH;
              return true;
            } else {
              localStorage.removeItem(SESSION_KEY);
            }
          }
        } catch {
          localStorage.removeItem(SESSION_KEY);
        }
        return false;
      }

      function createSession() {
        localStorage.setItem(SESSION_KEY, JSON.stringify({ loggedIn: true, user: 'admin', timestamp: Date.now() }));
      }

      function showError(message) {
        errorTextSpan.textContent = message || 'Invalid username or password.';
        loginErrorDiv.classList.remove('hidden');
      }

      function hideError() {
        loginErrorDiv.classList.add('hidden');
      }

      function setLoading(isLoading) {
        if (isLoading) {
          loginButton.disabled = true;
          btnText.innerHTML = '<span class="spinner"></span> Verifying...';
        } else {
          loginButton.disabled = false;
          btnText.textContent = '→ Log in';
        }
      }

      async function handleLogin(event) {
        event.preventDefault();
        hideError();

        const enteredUsername = usernameInput.value.trim();
        const enteredPassword = passwordInput.value.trim();

        if (!enteredUsername || !enteredPassword) {
          showError('Both username and password are required.');
          return;
        }

        setLoading(true);

        try {
          const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: enteredUsername, password: enteredPassword }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            createSession();
            window.location.href = DASHBOARD_PATH;
          } else {
            showError(data.message || 'Invalid username or password.');
            passwordInput.value = '';
            passwordInput.focus();
          }
        } catch {
          showError('Connection error. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      function init() {
        if (checkExistingSession()) return;
        loginForm.addEventListener('submit', handleLogin);
        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
        usernameInput.focus();
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
