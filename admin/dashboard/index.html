<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Admin Panel</title>
  <style>
    /* ----- HIDE UNTIL AUTH VERIFIED ----- */
    html:not(.auth-verified) body {
      display: none !important;
    }

    html.auth-verified body {
      display: flex !important;
      flex-direction: column;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c1419;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #e3e9e5;
    }

    /* ----- ANNOUNCEMENT SECTION ----- */
    .announcement-section {
      background: rgba(18, 25, 30, 0.95);
      border-bottom: 1px solid rgba(251, 191, 36, 0.3);
      padding: 1rem 2rem;
    }

    .announcement-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .announcement-content {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex: 1;
      min-width: 200px;
    }

    .announcement-icon {
      font-size: 1.5rem;
    }

    .announcement-text {
      color: #fde68a;
      font-weight: 500;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .announcement-empty {
      color: #6b8780;
      font-style: italic;
    }

    .announcement-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-sm {
      padding: 0.35rem 0.8rem;
      font-size: 0.75rem;
      border-radius: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .btn-edit-announcement {
      background: rgba(251, 191, 36, 0.2);
      color: #fcd34d;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .btn-edit-announcement:hover {
      background: rgba(251, 191, 36, 0.35);
    }

    .btn-delete-announcement {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-delete-announcement:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* ----- HEADER ----- */
    .dashboard-header {
      background: rgba(18, 25, 30, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(45, 212, 191, 0.2);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .dashboard-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0f5f2;
    }

    .badge {
      background: rgba(45, 212, 191, 0.15);
      color: #5ee3d0;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }

    /* ----- BUTTONS ----- */
    .btn {
      padding: 0.6rem 1.3rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
    }

    .btn-add {
      background: #14b8a6;
      color: #0a1c1a;
    }

    .btn-add:hover {
      background: #2dd4bf;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(20, 184, 166, 0.3);
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .btn-edit {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-edit:hover {
      background: rgba(59, 130, 246, 0.3);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .btn-save {
      background: #22c55e;
      color: white;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-save:hover {
      background: #16a34a;
    }

    .btn-cancel {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
      border: 1px solid rgba(107, 114, 128, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-cancel:hover {
      background: rgba(107, 114, 128, 0.4);
    }

    .btn-submit {
      background: #14b8a6;
      color: #0a1c1a;
      padding: 0.7rem 2rem;
      font-size: 0.9rem;
    }

    .btn-submit:hover {
      background: #2dd4bf;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ----- MODAL ----- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: #1a272e;
      border: 1px solid rgba(45, 212, 191, 0.3);
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
    }

    .modal-box.danger {
      border-color: rgba(239, 68, 68, 0.4);
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0f5f2;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-message {
      color: #d1d5db;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      background: #162026;
      border: 1px solid #2f4247;
      color: #ebf2ef;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      margin-bottom: 1rem;
      resize: vertical;
      min-height: 80px;
    }

    .modal-input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
    }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
    }

    .btn-confirm-danger {
      background: #ef4444;
      color: white;
    }

    .btn-confirm-danger:hover {
      background: #dc2626;
    }

    .btn-modal-cancel {
      background: rgba(107, 114, 128, 0.3);
      color: #d1d5db;
    }

    .btn-modal-cancel:hover {
      background: rgba(107, 114, 128, 0.5);
    }

    .btn-save-announcement {
      background: #f59e0b;
      color: #1a1a1a;
    }

    .btn-save-announcement:hover {
      background: #fbbf24;
    }

    /* ----- MAIN CONTAINER ----- */
    .main-container {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-divider {
      border: none;
      border-top: 1px solid rgba(70, 130, 120, 0.2);
      margin: 1.5rem 0;
    }

    /* ----- ADD PRODUCT FORM ----- */
    .form-container {
      background: rgba(18, 25, 30, 0.95);
      border: 1px solid rgba(45, 212, 191, 0.2);
      border-radius: 1.5rem;
      padding: 2rem;
      margin-bottom: 2rem;
      display: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .form-container.active {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0f5f2;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #9abfb5;
    }

    .form-input {
      background: #162026;
      border: 1px solid #2f4247;
      color: #ebf2ef;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 80px;
    }

    .file-upload-wrapper {
      position: relative;
    }

    .file-upload-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #162026;
      border: 2px dashed #2f4247;
      border-radius: 0.8rem;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #9abfb5;
    }

    .file-upload-label:hover {
      border-color: #2dd4bf;
      color: #5ee3d0;
    }

    .file-upload-label input[type="file"] {
      display: none;
    }

    .image-preview {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 0.8rem;
      margin-top: 0.5rem;
      display: none;
      border: 2px solid rgba(45, 212, 191, 0.3);
    }

    .image-preview.active {
      display: block;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      grid-column: 1 / -1;
    }

    /* ----- TABLE ----- */
    .table-wrapper {
      background: rgba(18, 25, 30, 0.9);
      border: 1px solid rgba(70, 130, 120, 0.2);
      border-radius: 1.5rem;
      overflow-x: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead {
      background: rgba(30, 180, 150, 0.08);
      border-bottom: 2px solid rgba(45, 212, 191, 0.2);
    }

    th {
      padding: 1rem 1.2rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #9abfb5;
      font-weight: 700;
    }

    td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid rgba(70, 130, 120, 0.1);
      font-size: 0.9rem;
      color: #d1d5db;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(30, 180, 150, 0.05);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .editable-input {
      background: #162026;
      border: 1px solid #2f4247;
      color: #ebf2ef;
      padding: 0.5rem 0.7rem;
      border-radius: 0.6rem;
      font-size: 0.85rem;
      width: 100%;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .editable-input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
    }

    .actions-cell {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .product-thumb {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 0.5rem;
      background: #1a272e;
    }

    .no-image {
      width: 50px;
      height: 50px;
      background: rgba(45, 212, 191, 0.1);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .loading-container {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(45, 212, 191, 0.2);
      border-top-color: #2dd4bf;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      animation: slideIn 0.3s ease;
      z-index: 1000;
      display: none;
      color: white;
    }

    .toast.success { background: #22c55e; }
    .toast.error { background: #ef4444; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .dashboard-header { flex-direction: column; align-items: flex-start; }
      .main-container { padding: 1rem; }
      th, td { padding: 0.6rem 0.8rem; font-size: 0.8rem; }
      .announcement-container { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- ----- ANNOUNCEMENT BAR ----- -->
  <section class="announcement-section" id="announcementSection">
    <div class="announcement-container">
      <div class="announcement-content">
        <span class="announcement-icon">📢</span>
        <span class="announcement-text" id="announcementText">
          <span class="announcement-empty">No announcement set</span>
        </span>
      </div>
      <div class="announcement-actions">
        <button class="btn-sm btn-edit-announcement" id="editAnnouncementBtn">✏️ Edit</button>
        <button class="btn-sm btn-delete-announcement" id="deleteAnnouncementBtn" style="display: none;">🗑️ Remove</button>
      </div>
    </div>
  </section>

  <!-- ----- HEADER ----- -->
  <header class="dashboard-header">
    <div class="header-left">
      <h1 class="dashboard-title">📊 Product Dashboard</h1>
      <span class="badge">Admin Panel</span>
    </div>
    <div style="display: flex; gap: 0.8rem; align-items: center;">
      <button class="btn btn-add" id="toggleFormBtn">➕ Add Product</button>
      <button class="btn btn-logout" id="logoutButton">🚪 Logout</button>
    </div>
  </header>

  <!-- ----- MAIN CONTENT ----- -->
  <main class="main-container">
    <!-- Add Product Form -->
    <div id="addProductForm" class="form-container">
      <h2 class="form-title">📦 Add New Product</h2>
      <form id="productForm" class="form-grid">
        <div class="form-group">
          <label for="productTitle">Title *</label>
          <input type="text" id="productTitle" class="form-input" placeholder="Product name" required>
        </div>
        <div class="form-group">
          <label for="productPrice">Price (₹) *</label>
          <input type="number" id="productPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group full-width">
          <label for="productDescription">Description</label>
          <textarea id="productDescription" class="form-input" placeholder="Product description..."></textarea>
        </div>
        <div class="form-group full-width">
          <label>Product Image</label>
          <div class="file-upload-wrapper">
            <label class="file-upload-label" for="productImage">📁 Choose Image
              <input type="file" id="productImage" accept="image/*">
            </label>
            <span id="fileName" style="color: #9abfb5; font-size: 0.85rem; margin-left: 0.5rem;"></span>
          </div>
          <img id="imagePreview" class="image-preview" src="" alt="Preview">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-submit" id="submitBtn">💾 Save Product</button>
          <button type="button" class="btn btn-cancel" id="cancelFormBtn">✖ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="loading-container">
      <div class="spinner"></div>
      <p style="color: #6b8780;">Loading...</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="loading-container" style="display: none;">
      <p style="color: #fca5a5;">❌ Failed to load</p>
      <button class="btn btn-add" onclick="location.reload()" style="margin-top: 1rem;">🔄 Retry</button>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="loading-container" style="display: none;">
      <p style="color: #6b8780;">📦 No products yet</p>
      <button class="btn btn-add" id="emptyAddBtn" style="margin-top: 1rem;">➕ Add Your First Product</button>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="table-wrapper" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Title</th>
            <th>Description</th>
            <th>Price (₹)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Announcement Edit Modal -->
  <div id="announcementModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <h3 class="modal-title">📢 Edit Announcement</h3>
      <textarea id="announcementInput" class="modal-input" placeholder="Enter announcement text..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" id="announcementCancelBtn">✖ Cancel</button>
        <button class="btn btn-save-announcement" id="announcementSaveBtn">💾 Save Announcement</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal-overlay" style="display: none;">
    <div class="modal-box danger">
      <h3 class="modal-title">⚠️ Delete Product?</h3>
      <p class="modal-message" id="deleteMessage"></p>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" id="modalCancelBtn">✖ Cancel</button>
        <button class="btn btn-confirm-danger" id="modalConfirmBtn">🗑️ Delete</button>
      </div>
    </div>
  </div>

  <!-- Delete Announcement Modal -->
  <div id="deleteAnnouncementModal" class="modal-overlay" style="display: none;">
    <div class="modal-box danger">
      <h3 class="modal-title">⚠️ Remove Announcement?</h3>
      <p class="modal-message">Are you sure you want to remove the announcement banner?</p>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" id="deleteAnnouncementCancelBtn">✖ Cancel</button>
        <button class="btn btn-confirm-danger" id="deleteAnnouncementConfirmBtn">🗑️ Remove</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    (function() {
      'use strict';

      // --------------------------------------------------------------
      // 🛡️ SESSION PROTECTION
      // --------------------------------------------------------------
      const SESSION_KEY = 'grocery_admin_session';
      const LOGIN_PATH = '/admin';

      function hasValidSession() {
        try {
          const sessionData = localStorage.getItem(SESSION_KEY);
          if (!sessionData) return false;
          const parsed = JSON.parse(sessionData);
          if (!parsed || parsed.loggedIn !== true || !parsed.timestamp) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          if (Date.now() - parsed.timestamp > 24 * 60 * 60 * 1000) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          return true;
        } catch (e) {
          localStorage.removeItem(SESSION_KEY);
          return false;
        }
      }

      if (!hasValidSession()) {
        window.location.replace(LOGIN_PATH);
        throw new Error('Unauthorized');
      }

      document.documentElement.classList.add('auth-verified');

      // --------------------------------------------------------------
      // 🔧 CONFIG
      // --------------------------------------------------------------
      let supabaseUrl = null;
      let supabaseAnonKey = null;
      const PRODUCT_TABLE = 'product';
      const ANNOUNCEMENT_TABLE = 'announcement';
      const BUCKET_NAME = 'product';

      // DOM Elements
      const addProductForm = document.getElementById('addProductForm');
      const productForm = document.getElementById('productForm');
      const toggleFormBtn = document.getElementById('toggleFormBtn');
      const cancelFormBtn = document.getElementById('cancelFormBtn');
      const emptyAddBtn = document.getElementById('emptyAddBtn');
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const emptyState = document.getElementById('emptyState');
      const tableContainer = document.getElementById('tableContainer');
      const tableBody = document.getElementById('tableBody');
      const toast = document.getElementById('toast');
      const imagePreview = document.getElementById('imagePreview');
      const fileName = document.getElementById('fileName');
      const productImage = document.getElementById('productImage');
      const submitBtn = document.getElementById('submitBtn');
      const deleteModal = document.getElementById('deleteModal');
      const deleteMessage = document.getElementById('deleteMessage');
      const modalCancelBtn = document.getElementById('modalCancelBtn');
      const modalConfirmBtn = document.getElementById('modalConfirmBtn');

      // Announcement DOM
      const announcementText = document.getElementById('announcementText');
      const editAnnouncementBtn = document.getElementById('editAnnouncementBtn');
      const deleteAnnouncementBtn = document.getElementById('deleteAnnouncementBtn');
      const announcementModal = document.getElementById('announcementModal');
      const announcementInput = document.getElementById('announcementInput');
      const announcementCancelBtn = document.getElementById('announcementCancelBtn');
      const announcementSaveBtn = document.getElementById('announcementSaveBtn');
      const deleteAnnouncementModal = document.getElementById('deleteAnnouncementModal');
      const deleteAnnouncementCancelBtn = document.getElementById('deleteAnnouncementCancelBtn');
      const deleteAnnouncementConfirmBtn = document.getElementById('deleteAnnouncementConfirmBtn');

      let editingRowId = null;
      let allProducts = [];
      let selectedFile = null;
      let deleteTargetId = null;
      let deleteTargetTitle = null;
      let currentAnnouncement = null;

      // --------------------------------------------------------------
      // TOAST
      // --------------------------------------------------------------
      function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // --------------------------------------------------------------
      // CONFIG
      // --------------------------------------------------------------
      async function fetchConfig() {
        try {
          const response = await fetch('/api/config');
          if (!response.ok) throw new Error('Config failed');
          const config = await response.json();
          supabaseUrl = config.supabaseUrl;
          supabaseAnonKey = config.supabaseAnonKey;
          return true;
        } catch (e) {
          showToast('Failed to load configuration', 'error');
          return false;
        }
      }

      // --------------------------------------------------------------
      // ANNOUNCEMENT FUNCTIONS
      // --------------------------------------------------------------
      async function fetchAnnouncement() {
        try {
          const response = await fetch(`${supabaseUrl}/rest/v1/${ANNOUNCEMENT_TABLE}?select=*&limit=1`, {
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
            },
          });

          if (!response.ok) return;

          const data = await response.json();
          
          if (data && data.length > 0) {
            currentAnnouncement = data[0];
            announcementText.innerHTML = currentAnnouncement.text;
            announcementText.classList.remove('announcement-empty');
            deleteAnnouncementBtn.style.display = 'inline-flex';
            editAnnouncementBtn.textContent = '✏️ Edit';
          } else {
            currentAnnouncement = null;
            announcementText.innerHTML = '<span class="announcement-empty">No announcement set</span>';
            deleteAnnouncementBtn.style.display = 'none';
            editAnnouncementBtn.textContent = '➕ Add Announcement';
          }
        } catch (e) {
          console.error('Announcement fetch error:', e);
        }
      }

      editAnnouncementBtn.addEventListener('click', () => {
        announcementInput.value = currentAnnouncement ? currentAnnouncement.text : '';
        announcementModal.style.display = 'flex';
        announcementInput.focus();
      });

      announcementCancelBtn.addEventListener('click', () => {
        announcementModal.style.display = 'none';
      });

      announcementModal.addEventListener('click', (e) => {
        if (e.target === announcementModal) announcementModal.style.display = 'none';
      });

      announcementSaveBtn.addEventListener('click', async () => {
        const text = announcementInput.value.trim();
        
        if (!text) {
          showToast('Announcement text cannot be empty!', 'error');
          return;
        }

        announcementSaveBtn.disabled = true;
        announcementSaveBtn.textContent = '⏳ Saving...';

        try {
          if (currentAnnouncement) {
            // Update existing
            const response = await fetch(`${supabaseUrl}/rest/v1/${ANNOUNCEMENT_TABLE}?id=eq.${currentAnnouncement.id}`, {
              method: 'PATCH',
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ text: text }),
            });
            if (!response.ok) throw new Error('Update failed');
          } else {
            // Insert new
            const response = await fetch(`${supabaseUrl}/rest/v1/${ANNOUNCEMENT_TABLE}`, {
              method: 'POST',
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ text: text }),
            });
            if (!response.ok) throw new Error('Insert failed');
          }

          showToast('✅ Announcement saved!');
          announcementModal.style.display = 'none';
          await fetchAnnouncement();

        } catch (error) {
          console.error('Error:', error);
          showToast('Failed to save announcement', 'error');
        } finally {
          announcementSaveBtn.disabled = false;
          announcementSaveBtn.textContent = '💾 Save Announcement';
        }
      });

      // Delete announcement
      deleteAnnouncementBtn.addEventListener('click', () => {
        deleteAnnouncementModal.style.display = 'flex';
      });

      deleteAnnouncementCancelBtn.addEventListener('click', () => {
        deleteAnnouncementModal.style.display = 'none';
      });

      deleteAnnouncementModal.addEventListener('click', (e) => {
        if (e.target === deleteAnnouncementModal) deleteAnnouncementModal.style.display = 'none';
      });

      deleteAnnouncementConfirmBtn.addEventListener('click', async () => {
        if (!currentAnnouncement) return;

        deleteAnnouncementConfirmBtn.disabled = true;
        deleteAnnouncementConfirmBtn.textContent = '⏳ Removing...';

        try {
          const response = await fetch(`${supabaseUrl}/rest/v1/${ANNOUNCEMENT_TABLE}?id=eq.${currentAnnouncement.id}`, {
            method: 'DELETE',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
            },
          });
          if (!response.ok) throw new Error('Delete failed');

          showToast('🗑️ Announcement removed!');
          deleteAnnouncementModal.style.display = 'none';
          await fetchAnnouncement();

        } catch (error) {
          showToast('Failed to remove announcement', 'error');
        } finally {
          deleteAnnouncementConfirmBtn.disabled = false;
          deleteAnnouncementConfirmBtn.textContent = '🗑️ Remove';
        }
      });

      // --------------------------------------------------------------
      // PRODUCT DELETE MODAL
      // --------------------------------------------------------------
      function showDeleteModal(productId, productTitle) {
        deleteTargetId = productId;
        deleteTargetTitle = productTitle;
        deleteMessage.innerHTML = `Are you sure you want to delete <strong>"${escapeHtml(productTitle)}"</strong>?<br>This action <strong>cannot be undone</strong>.`;
        deleteModal.style.display = 'flex';
      }

      function hideDeleteModal() {
        deleteModal.style.display = 'none';
        deleteTargetId = null;
        deleteTargetTitle = null;
      }

      modalCancelBtn.addEventListener('click', hideDeleteModal);
      deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) hideDeleteModal(); });

      modalConfirmBtn.addEventListener('click', async () => {
        if (!deleteTargetId) return;
        modalConfirmBtn.disabled = true;
        modalConfirmBtn.textContent = '⏳ Deleting...';
        try {
          const response = await fetch(`${supabaseUrl}/rest/v1/${PRODUCT_TABLE}?id=eq.${deleteTargetId}`, {
            method: 'DELETE',
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}` },
          });
          if (!response.ok) throw new Error('Delete failed');
          allProducts = allProducts.filter(p => p.id !== deleteTargetId);
          const row = document.querySelector(`tr[data-id="${deleteTargetId}"]`);
          if (row) { row.style.opacity = '0'; row.style.transform = 'translateX(20px)'; setTimeout(() => row.remove(), 300); }
          showToast(`🗑️ "${deleteTargetTitle}" deleted!`);
          if (allProducts.length === 0) showState('empty');
        } catch (error) {
          showToast('Failed to delete product', 'error');
        } finally {
          hideDeleteModal();
          modalConfirmBtn.disabled = false;
          modalConfirmBtn.textContent = '🗑️ Delete';
        }
      });

      // --------------------------------------------------------------
      // FETCH PRODUCTS
      // --------------------------------------------------------------
      async function fetchProducts() {
        try {
          showState('loading');
          const response = await fetch(`${supabaseUrl}/rest/v1/${PRODUCT_TABLE}?select=*&order=id.asc`, {
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}` },
          });
          if (!response.ok) throw new Error('Fetch failed');
          const products = await response.json();
          allProducts = products;
          if (!products || products.length === 0) { showState('empty'); return; }
          renderTable(products);
          showState('table');
        } catch (e) { showState('error'); }
      }

      function renderTable(products) {
        tableBody.innerHTML = '';
        products.forEach(product => {
          const row = document.createElement('tr');
          row.setAttribute('data-id', product.id);
          row.innerHTML = `
            <td>#${product.id}</td>
            <td>${product.image_url ? `<img src="${escapeHtml(product.image_url)}" class="product-thumb" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>🥬</div>'">` : '<div class="no-image">🥬</div>'}</td>
            <td class="cell-title">${escapeHtml(product.title || '—')}</td>
            <td class="cell-description">${escapeHtml(product.description || '—')}</td>
            <td class="cell-price">₹${parseFloat(product.price || 0).toFixed(2)}</td>
            <td class="actions-cell">
              <button class="btn btn-edit" onclick="window.startEdit(${product.id})">✏️ Edit</button>
              <button class="btn btn-delete" onclick="window.confirmDelete(${product.id}, '${escapeHtml(product.title || 'this product')}')">🗑️ Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      // ... (rest of the existing functions: uploadImage, add product, edit product, etc.)
      // They remain exactly the same as the previous version

      async function uploadImage(file) {
        const timestamp = Date.now();
        const fileExt = file.name.split('.').pop();
        const uniqueName = `${timestamp}-${Math.random().toString(36).substring(2, 8)}.${fileExt}`;
        const response = await fetch(`${supabaseUrl}/storage/v1/object/${BUCKET_NAME}/${uniqueName}`, {
          method: 'POST',
          headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}`, 'Content-Type': file.type },
          body: file,
        });
        if (!response.ok) throw new Error('Upload failed');
        return `${supabaseUrl}/storage/v1/object/public/${BUCKET_NAME}/${uniqueName}`;
      }

      productForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('productTitle').value.trim();
        const price = parseFloat(document.getElementById('productPrice').value) || 0;
        const description = document.getElementById('productDescription').value.trim();
        if (!title) { showToast('Title is required!', 'error'); return; }
        submitBtn.disabled = true; submitBtn.textContent = '⏳ Saving...';
        try {
          let imageUrl = null;
          if (selectedFile) imageUrl = await uploadImage(selectedFile);
          const response = await fetch(`${supabaseUrl}/rest/v1/${PRODUCT_TABLE}`, {
            method: 'POST',
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify({ title, price, description, image_url: imageUrl }),
          });
          if (!response.ok) throw new Error('Insert failed');
          showToast('✅ Product added!');
          productForm.reset(); selectedFile = null; imagePreview.classList.remove('active'); imagePreview.src = ''; fileName.textContent = '';
          addProductForm.classList.remove('active'); toggleFormBtn.textContent = '➕ Add Product';
          await fetchProducts();
        } catch (error) { showToast('Failed: ' + error.message, 'error'); }
        finally { submitBtn.disabled = false; submitBtn.textContent = '💾 Save Product'; }
      });

      function showForm() { addProductForm.classList.add('active'); toggleFormBtn.textContent = '✖ Close Form'; document.getElementById('productTitle').focus(); }
      function hideForm() { addProductForm.classList.remove('active'); toggleFormBtn.textContent = '➕ Add Product'; productForm.reset(); selectedFile = null; imagePreview.classList.remove('active'); imagePreview.src = ''; fileName.textContent = ''; }
      toggleFormBtn.addEventListener('click', () => { addProductForm.classList.contains('active') ? hideForm() : showForm(); });
      cancelFormBtn.addEventListener('click', hideForm);
      if (emptyAddBtn) emptyAddBtn.addEventListener('click', showForm);
      productImage.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) { selectedFile = file; fileName.textContent = file.name; const reader = new FileReader(); reader.onload = (ev) => { imagePreview.src = ev.target.result; imagePreview.classList.add('active'); }; reader.readAsDataURL(file); }
        else { selectedFile = null; fileName.textContent = ''; imagePreview.classList.remove('active'); imagePreview.src = ''; }
      });

      window.startEdit = function(productId) { /* same as before */ };
      window.cancelEdit = function(productId) { /* same as before */ };
      window.saveEdit = async function(productId) { /* same as before */ };
      window.confirmDelete = function(productId, productTitle) { showDeleteModal(productId, productTitle); };

      function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
      function showState(state) { loadingState.style.display='none'; errorState.style.display='none'; emptyState.style.display='none'; tableContainer.style.display='none'; if(state==='loading')loadingState.style.display='block'; if(state==='error')errorState.style.display='block'; if(state==='empty')emptyState.style.display='block'; if(state==='table')tableContainer.style.display='block'; }
      function handleLogout() { localStorage.removeItem(SESSION_KEY); window.location.replace(LOGIN_PATH); }

      async function init() {
        document.getElementById('logoutButton').addEventListener('click', handleLogout);
        setInterval(() => { if (!hasValidSession()) handleLogout(); }, 5000);
        const configOk = await fetchConfig();
        if (configOk) {
          await fetchAnnouncement();
          await fetchProducts();
        } else showState('error');
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
