<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Batisha admin</title>
  <style>
    /* ----- HIDE UNTIL AUTH VERIFIED ----- */
    html:not(.auth-verified) body {
      display: none !important;
    }

    html.auth-verified body {
      display: flex !important;
      flex-direction: column;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fcfcfc;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
      color: #1e2b3a;
    }

    /* ----- HEADER (matches main site) ----- */
    .dashboard-header {
      background: #ffffff;
      border-bottom: 1px solid #eaeef3;
      padding: 0.7rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: #1f2a3a;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #1e6b3e, #2b7a4a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(30, 107, 62, 0.12);
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
      display: block;
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1f2a3a;
    }
    .logo-text span {
      font-weight: 400;
      color: #4b6b5e;
      font-size: 0.8rem;
      margin-left: 0.1rem;
    }

    .dashboard-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a3428;
      margin-left: 0.5rem;
    }

    .badge {
      background: #f0f8f2;
      color: #1f8b4c;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #dce8e2;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    /* ----- NAV LINKS (admin navigation) ----- */
    .admin-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .admin-nav a {
      text-decoration: none;
      color: #2f3e4e;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      transition: 0.15s;
    }
    .admin-nav a:hover {
      background: #f0f8f2;
      color: #0f6e3a;
    }
    .admin-nav a.active {
      background: #f0f8f2;
      color: #0f6e3a;
      font-weight: 600;
    }

    /* ----- BUTTONS ----- */
    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.15s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      text-decoration: none;
    }

    .btn-add {
      background: #1f8b4c;
      color: white;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.15);
    }
    .btn-add:hover {
      background: #0f6e3a;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(31, 139, 76, 0.2);
    }

    .btn-logout {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .btn-logout:hover {
      background: #fee2e2;
    }

    .btn-edit {
      background: #f0f5fc;
      color: #1e3a5f;
      border: 1px solid #dde5ed;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-edit:hover {
      background: #e4edf7;
    }

    .btn-delete {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-delete:hover {
      background: #fee2e2;
    }

    .btn-save {
      background: #1f8b4c;
      color: white;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-save:hover {
      background: #0f6e3a;
    }

    .btn-cancel {
      background: #f0f5fc;
      color: #1f2a3a;
      border: 1px solid #dde5ed;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-cancel:hover {
      background: #e4edf7;
    }

    .btn-submit {
      background: #1f8b4c;
      color: white;
      padding: 0.6rem 1.8rem;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.15);
    }
    .btn-submit:hover {
      background: #0f6e3a;
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ----- CONFIRMATION MODAL ----- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      width: 92%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      border: 1px solid #eef2f6;
    }
    .modal-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a3428;
      margin-bottom: 0.4rem;
    }
    .modal-message {
      color: #4b5f53;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }
    .btn-confirm-delete {
      background: #dc2626;
      color: white;
      padding: 0.5rem 1.5rem;
    }
    .btn-confirm-delete:hover {
      background: #b91c1c;
    }
    .btn-confirm-delete:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-modal-cancel {
      background: #f0f5fc;
      color: #1f2a3a;
      border: 1px solid #dde5ed;
      padding: 0.5rem 1.5rem;
    }
    .btn-modal-cancel:hover {
      background: #e4edf7;
    }

    /* ----- MAIN CONTAINER ----- */
    .main-container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ----- ADD PRODUCT FORM (clean, white) ----- */
    .form-container {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: none;
      box-shadow: 0 1px 6px rgba(0,0,0,0.02);
    }
    .form-container.active {
      display: block;
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a3428;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1a3428;
    }
    .form-input {
      background: #f8fbf9;
      border: 1px solid #dde5ed;
      color: #1e2b3a;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: 0.15s;
      width: 100%;
    }
    .form-input:focus {
      border-color: #1f8b4c;
      box-shadow: 0 0 0 3px rgba(31, 139, 76, 0.08);
      background: #ffffff;
    }
    textarea.form-input {
      resize: vertical;
      min-height: 70px;
    }

    .file-upload-wrapper {
      position: relative;
    }
    .file-upload-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f8fbf9;
      border: 2px dashed #dde5ed;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: 0.15s;
      color: #4b5f53;
    }
    .file-upload-label:hover {
      border-color: #1f8b4c;
      color: #1f8b4c;
    }
    .file-upload-label input[type="file"] {
      display: none;
    }
    .image-preview {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 10px;
      margin-top: 0.5rem;
      display: none;
      border: 1px solid #eef2f6;
      background: #f8fbf9;
    }
    .image-preview.active {
      display: block;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      grid-column: 1 / -1;
    }

    /* ----- TABLE (clean, white) ----- */
    .table-wrapper {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 16px;
      overflow-x: auto;
      box-shadow: 0 1px 6px rgba(0,0,0,0.02);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }
    thead {
      background: #f8fbf9;
      border-bottom: 1px solid #eef2f6;
    }
    th {
      padding: 0.8rem 1.2rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #4b5f53;
      font-weight: 600;
    }
    td {
      padding: 0.7rem 1.2rem;
      border-bottom: 1px solid #f0f5f2;
      font-size: 0.85rem;
      color: #1e2b3a;
      vertical-align: middle;
    }
    tbody tr:hover {
      background: #f8fbf9;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }

    .editable-input {
      background: #f8fbf9;
      border: 1px solid #dde5ed;
      color: #1e2b3a;
      padding: 0.4rem 0.7rem;
      border-radius: 8px;
      font-size: 0.85rem;
      width: 100%;
      font-family: inherit;
      outline: none;
      transition: 0.15s;
    }
    .editable-input:focus {
      border-color: #1f8b4c;
      box-shadow: 0 0 0 2px rgba(31, 139, 76, 0.08);
    }

    .actions-cell {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .product-thumb {
      width: 45px;
      height: 45px;
      object-fit: contain;
      border-radius: 8px;
      background: #f8fbf9;
      border: 1px solid #eef2f6;
    }
    .no-image {
      width: 45px;
      height: 45px;
      background: #f8fbf9;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 1px solid #eef2f6;
    }

    /* ----- LOADING / EMPTY / ERROR ----- */
    .loading-container {
      text-align: center;
      padding: 3rem;
      color: #4b5f53;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2ebe6;
      border-top-color: #1f8b4c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 500;
      animation: slideIn 0.3s ease;
      z-index: 1000;
      display: none;
      color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .toast.success { background: #1f8b4c; }
    .toast.error { background: #dc2626; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ----- MOBILE ----- */
    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        align-items: stretch;
        padding: 0.8rem 1rem;
      }
      .header-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .header-right {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
      }
      .admin-nav {
        flex-wrap: wrap;
        gap: 0.3rem;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .main-container {
        padding: 1rem;
      }
      th, td {
        padding: 0.5rem 0.8rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <!-- ----- HEADER ----- -->
  <header class="dashboard-header">
    <div class="header-left">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 10v-2a6 6 0 0 1 12 0v2h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2h4zm2 0h8v-2a4 4 0 0 0-8 0v2zm-2 2v2h2v-2h-2zm4 0v2h4v-2h-4zm8 0v2h2v-2h-2zM8 14v2h2v-2H8zm16 0v2h2v-2h-2zM8 18v8h16v-8H8z"/>
          </svg>
        </div>
        <span class="logo-text">Batisha <span>online</span></span>
      </a>
      <span class="dashboard-title">📊 Dashboard</span>
      <span class="badge">Admin</span>
    </div>

    <div class="header-right">
      <nav class="admin-nav">
        <a href="/admin">Products</a>
        <a href="/admin/orders">📦 Orders</a>
      </nav>
      <button class="btn btn-add" id="toggleFormBtn">➕ Add Product</button>
      <button class="btn btn-logout" id="logoutButton">🚪 Logout</button>
    </div>
  </header>

  <!-- ----- MAIN CONTENT ----- -->
  <main class="main-container">
    <!-- Add Product Form -->
    <div id="addProductForm" class="form-container">
      <h2 class="form-title">📦 Add New Product</h2>
      <form id="productForm" class="form-grid">
        <div class="form-group">
          <label for="productTitle">Title *</label>
          <input type="text" id="productTitle" class="form-input" placeholder="Product name" required>
        </div>
        <div class="form-group">
          <label for="productPrice">Price (₹) *</label>
          <input type="number" id="productPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group full-width">
          <label for="productDescription">Description</label>
          <textarea id="productDescription" class="form-input" placeholder="Product description..."></textarea>
        </div>
        <div class="form-group full-width">
          <label>Product Image</label>
          <div class="file-upload-wrapper">
            <label class="file-upload-label" for="productImage">
              📁 Choose Image
              <input type="file" id="productImage" accept="image/*">
            </label>
            <span id="fileName" style="color: #4b5f53; font-size: 0.85rem; margin-left: 0.5rem;"></span>
          </div>
          <img id="imagePreview" class="image-preview" src="" alt="Preview">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-submit" id="submitBtn">💾 Save Product</button>
          <button type="button" class="btn btn-cancel" id="cancelFormBtn">✖ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="loading-container">
      <div class="spinner"></div>
      <p>Loading products...</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="loading-container" style="display: none;">
      <p style="color: #991b1b;">❌ Failed to load products</p>
      <button class="btn btn-add" onclick="location.reload()" style="margin-top: 1rem;">🔄 Retry</button>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="loading-container" style="display: none;">
      <p style="color: #4b5f53;">📦 No products yet</p>
      <button class="btn btn-add" id="emptyAddBtn" style="margin-top: 1rem;">➕ Add Your First Product</button>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="table-wrapper" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Title</th>
            <th>Description</th>
            <th>Price (₹)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <h3 class="modal-title">Delete Product?</h3>
      <p class="modal-message" id="deleteMessage">
        Are you sure you want to delete this product?<br>
        This action <strong>cannot be undone</strong>.
      </p>
      <div class="modal-actions">
        <button class="btn btn-modal-cancel" id="modalCancelBtn">✖ Cancel</button>
        <button class="btn btn-confirm-delete" id="modalConfirmBtn">🗑️ Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    (function() {
      'use strict';

      // --------------------------------------------------------------
      // 🛡️ SESSION PROTECTION
      // --------------------------------------------------------------
      const SESSION_KEY = 'grocery_admin_session';
      const LOGIN_PATH = '/admin';

      function hasValidSession() {
        try {
          const sessionData = localStorage.getItem(SESSION_KEY);
          if (!sessionData) return false;
          const parsed = JSON.parse(sessionData);
          if (!parsed || parsed.loggedIn !== true || !parsed.timestamp) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          if (Date.now() - parsed.timestamp > 24 * 60 * 60 * 1000) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          return true;
        } catch {
          localStorage.removeItem(SESSION_KEY);
          return false;
        }
      }

      if (!hasValidSession()) {
        window.location.replace(LOGIN_PATH);
        throw new Error('Unauthorized');
      }

      document.documentElement.classList.add('auth-verified');

      // --------------------------------------------------------------
      // 🔧 CONFIG
      // --------------------------------------------------------------
      let supabaseUrl = null;
      let supabaseAnonKey = null;
      const TABLE_NAME = 'product';
      const BUCKET_NAME = 'product';

      const addProductForm = document.getElementById('addProductForm');
      const productForm = document.getElementById('productForm');
      const toggleFormBtn = document.getElementById('toggleFormBtn');
      const cancelFormBtn = document.getElementById('cancelFormBtn');
      const emptyAddBtn = document.getElementById('emptyAddBtn');
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const emptyState = document.getElementById('emptyState');
      const tableContainer = document.getElementById('tableContainer');
      const tableBody = document.getElementById('tableBody');
      const toast = document.getElementById('toast');
      const imagePreview = document.getElementById('imagePreview');
      const fileName = document.getElementById('fileName');
      const productImage = document.getElementById('productImage');
      const submitBtn = document.getElementById('submitBtn');
      const deleteModal = document.getElementById('deleteModal');
      const deleteMessage = document.getElementById('deleteMessage');
      const modalCancelBtn = document.getElementById('modalCancelBtn');
      const modalConfirmBtn = document.getElementById('modalConfirmBtn');

      let editingRowId = null;
      let allProducts = [];
      let selectedFile = null;
      let deleteTargetId = null;
      let deleteTargetTitle = null;
      let deleteTargetImageUrl = null;

      // --------------------------------------------------------------
      // TOAST
      // --------------------------------------------------------------
      function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // --------------------------------------------------------------
      // EXTRACT FILE PATH FROM SUPABASE URL
      // --------------------------------------------------------------
      function extractFilePathFromUrl(imageUrl) {
        if (!imageUrl) return null;
        try {
          const url = new URL(imageUrl);
          const pathParts = url.pathname.split('/');
          const bucketIndex = pathParts.indexOf(BUCKET_NAME);
          if (bucketIndex !== -1 && bucketIndex < pathParts.length - 1) {
            return pathParts.slice(bucketIndex + 1).join('/');
          }
          return null;
        } catch {
          return null;
        }
      }

      // --------------------------------------------------------------
      // DELETE IMAGE FROM STORAGE
      // --------------------------------------------------------------
      async function deleteImageFromStorage(imageUrl) {
        if (!imageUrl) return true;
        const filePath = extractFilePathFromUrl(imageUrl);
        if (!filePath) return true;
        try {
          const response = await fetch(
            `${supabaseUrl}/storage/v1/object/${BUCKET_NAME}/${filePath}`,
            {
              method: 'DELETE',
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
              },
            }
          );
          if (!response.ok) {
            console.warn('Image deletion warning:', await response.text());
          }
          return true;
        } catch {
          return true;
        }
      }

      // --------------------------------------------------------------
      // DELETE MODAL
      // --------------------------------------------------------------
      function showDeleteModal(productId, productTitle, imageUrl) {
        deleteTargetId = productId;
        deleteTargetTitle = productTitle;
        deleteTargetImageUrl = imageUrl;
        deleteMessage.innerHTML = `Are you sure you want to delete <strong>"${escapeHtml(productTitle)}"</strong>?<br>This action <strong>cannot be undone</strong>.`;
        deleteModal.style.display = 'flex';
      }

      function hideDeleteModal() {
        deleteModal.style.display = 'none';
        deleteTargetId = null;
        deleteTargetTitle = null;
        deleteTargetImageUrl = null;
      }

      modalCancelBtn.addEventListener('click', hideDeleteModal);
      deleteModal.addEventListener('click', (e) => {
        if (e.target === deleteModal) hideDeleteModal();
      });

      modalConfirmBtn.addEventListener('click', async () => {
        if (!deleteTargetId) return;
        modalConfirmBtn.disabled = true;
        modalConfirmBtn.textContent = '⏳ Deleting...';

        try {
          if (deleteTargetImageUrl) {
            await deleteImageFromStorage(deleteTargetImageUrl);
          }
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?id=eq.${deleteTargetId}`, {
            method: 'DELETE',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
            },
          });
          if (!response.ok) throw new Error('Delete failed');

          allProducts = allProducts.filter(p => p.id !== deleteTargetId);
          const row = document.querySelector(`tr[data-id="${deleteTargetId}"]`);
          if (row) {
            row.style.transition = 'all 0.3s ease';
            row.style.opacity = '0';
            row.style.transform = 'translateX(20px)';
            setTimeout(() => row.remove(), 300);
          }
          showToast(`🗑️ "${deleteTargetTitle}" deleted!`);
          if (allProducts.length === 0) showState('empty');
        } catch (error) {
          showToast(`Failed to delete: ${error.message}`, 'error');
        } finally {
          hideDeleteModal();
          modalConfirmBtn.disabled = false;
          modalConfirmBtn.textContent = '🗑️ Delete';
        }
      });

      // --------------------------------------------------------------
      // CONFIG
      // --------------------------------------------------------------
      async function fetchConfig() {
        try {
          const response = await fetch('/api/config');
          if (!response.ok) throw new Error('Config failed');
          const config = await response.json();
          supabaseUrl = config.supabaseUrl;
          supabaseAnonKey = config.supabaseAnonKey;
          return true;
        } catch {
          showToast('Failed to load configuration', 'error');
          return false;
        }
      }

      // --------------------------------------------------------------
      // FETCH PRODUCTS
      // --------------------------------------------------------------
      async function fetchProducts() {
        try {
          showState('loading');
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?select=*&order=id.asc`, {
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
            },
          });
          if (!response.ok) throw new Error('Fetch failed');
          const products = await response.json();
          allProducts = products;
          if (!products || products.length === 0) {
            showState('empty');
            return;
          }
          renderTable(products);
          showState('table');
        } catch {
          showState('error');
        }
      }

      // --------------------------------------------------------------
      // RENDER TABLE
      // --------------------------------------------------------------
      function renderTable(products) {
        tableBody.innerHTML = '';
        products.forEach(product => {
          const row = document.createElement('tr');
          row.setAttribute('data-id', product.id);
          row.innerHTML = `
            <td>#${product.id}</td>
            <td>${product.image_url ? `<img src="${escapeHtml(product.image_url)}" class="product-thumb" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>🥬</div>'">` : '<div class="no-image">🥬</div>'}</td>
            <td class="cell-title">${escapeHtml(product.title || '—')}</td>
            <td class="cell-description">${escapeHtml(product.description || '—')}</td>
            <td class="cell-price">₹${parseFloat(product.price || 0).toFixed(2)}</td>
            <td class="actions-cell">
              <button class="btn btn-edit" onclick="window.startEdit(${product.id})">✏️ Edit</button>
              <button class="btn btn-delete" onclick="window.confirmDelete(${product.id}, '${escapeHtml(product.title || 'this product')}', '${escapeHtml(product.image_url || '')}')">🗑️ Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      // --------------------------------------------------------------
      // IMAGE UPLOAD
      // --------------------------------------------------------------
      async function uploadImage(file) {
        const timestamp = Date.now();
        const fileExt = file.name.split('.').pop();
        const uniqueName = `${timestamp}-${Math.random().toString(36).substring(2, 8)}.${fileExt}`;
        const response = await fetch(`${supabaseUrl}/storage/v1/object/${BUCKET_NAME}/${uniqueName}`, {
          method: 'POST',
          headers: {
            'apikey': supabaseAnonKey,
            'Authorization': `Bearer ${supabaseAnonKey}`,
            'Content-Type': file.type,
          },
          body: file,
        });
        if (!response.ok) throw new Error('Upload failed');
        return `${supabaseUrl}/storage/v1/object/public/${BUCKET_NAME}/${uniqueName}`;
      }

      // --------------------------------------------------------------
      // ADD PRODUCT
      // --------------------------------------------------------------
      productForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('productTitle').value.trim();
        const price = parseFloat(document.getElementById('productPrice').value) || 0;
        const description = document.getElementById('productDescription').value.trim();
        if (!title) {
          showToast('Title is required!', 'error');
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Saving...';
        try {
          let imageUrl = null;
          if (selectedFile) {
            imageUrl = await uploadImage(selectedFile);
          }
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}`, {
            method: 'POST',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({ title, price, description, image_url: imageUrl }),
          });
          if (!response.ok) throw new Error('Insert failed');
          showToast('✅ Product added!');
          productForm.reset();
          selectedFile = null;
          imagePreview.classList.remove('active');
          imagePreview.src = '';
          fileName.textContent = '';
          addProductForm.classList.remove('active');
          toggleFormBtn.textContent = '➕ Add Product';
          await fetchProducts();
        } catch (error) {
          showToast('Failed to add product: ' + error.message, 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '💾 Save Product';
        }
      });

      // --------------------------------------------------------------
      // TOGGLE FORM
      // --------------------------------------------------------------
      function showForm() {
        addProductForm.classList.add('active');
        toggleFormBtn.textContent = '✖ Close Form';
        document.getElementById('productTitle').focus();
      }
      function hideForm() {
        addProductForm.classList.remove('active');
        toggleFormBtn.textContent = '➕ Add Product';
        productForm.reset();
        selectedFile = null;
        imagePreview.classList.remove('active');
        imagePreview.src = '';
        fileName.textContent = '';
      }
      toggleFormBtn.addEventListener('click', () => {
        addProductForm.classList.contains('active') ? hideForm() : showForm();
      });
      cancelFormBtn.addEventListener('click', hideForm);
      if (emptyAddBtn) emptyAddBtn.addEventListener('click', showForm);

      productImage.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          selectedFile = file;
          fileName.textContent = file.name;
          const reader = new FileReader();
          reader.onload = (event) => {
            imagePreview.src = event.target.result;
            imagePreview.classList.add('active');
          };
          reader.readAsDataURL(file);
        } else {
          selectedFile = null;
          fileName.textContent = '';
          imagePreview.classList.remove('active');
          imagePreview.src = '';
        }
      });

      // --------------------------------------------------------------
      // EDIT PRODUCT
      // --------------------------------------------------------------
      window.startEdit = function(productId) {
        if (editingRowId !== null) window.cancelEdit(editingRowId);
        editingRowId = productId;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;
        row.querySelector('.cell-title').innerHTML = `<input type="text" class="editable-input edit-title" value="${escapeHtml(product.title || '')}">`;
        row.querySelector('.cell-description').innerHTML = `<input type="text" class="editable-input edit-description" value="${escapeHtml(product.description || '')}">`;
        row.querySelector('.cell-price').innerHTML = `<input type="number" class="editable-input edit-price" value="${product.price || 0}" step="0.01">`;
        row.querySelector('.actions-cell').innerHTML = `
          <button class="btn btn-save" onclick="window.saveEdit(${productId})">💾 Save</button>
          <button class="btn btn-cancel" onclick="window.cancelEdit(${productId})">✖ Cancel</button>
        `;
      };

      window.cancelEdit = function(productId) {
        editingRowId = null;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;
        row.querySelector('.cell-title').innerHTML = escapeHtml(product.title || '—');
        row.querySelector('.cell-description').innerHTML = escapeHtml(product.description || '—');
        row.querySelector('.cell-price').innerHTML = `₹${parseFloat(product.price || 0).toFixed(2)}`;
        row.querySelector('.actions-cell').innerHTML = `
          <button class="btn btn-edit" onclick="window.startEdit(${productId})">✏️ Edit</button>
          <button class="btn btn-delete" onclick="window.confirmDelete(${productId}, '${escapeHtml(product.title || 'this product')}', '${escapeHtml(product.image_url || '')}')">🗑️ Delete</button>
        `;
      };

      window.saveEdit = async function(productId) {
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;
        const titleInput = row.querySelector('.edit-title');
        const descriptionInput = row.querySelector('.edit-description');
        const priceInput = row.querySelector('.edit-price');
        if (!titleInput || !priceInput) return;
        const updatedTitle = titleInput.value.trim();
        const updatedDescription = descriptionInput ? descriptionInput.value.trim() : '';
        const updatedPrice = parseFloat(priceInput.value) || 0;
        if (!updatedTitle) {
          showToast('Title is required!', 'error');
          return;
        }
        const saveBtn = row.querySelector('.btn-save');
        saveBtn.textContent = '⏳...';
        saveBtn.disabled = true;
        try {
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?id=eq.${productId}`, {
            method: 'PATCH',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({ title: updatedTitle, description: updatedDescription, price: updatedPrice }),
          });
          if (!response.ok) throw new Error('Update failed');
          const productIndex = allProducts.findIndex(p => p.id === productId);
          if (productIndex !== -1) {
            allProducts[productIndex].title = updatedTitle;
            allProducts[productIndex].description = updatedDescription;
            allProducts[productIndex].price = updatedPrice;
          }
          editingRowId = null;
          row.querySelector('.cell-title').innerHTML = escapeHtml(updatedTitle);
          row.querySelector('.cell-description').innerHTML = escapeHtml(updatedDescription);
          row.querySelector('.cell-price').innerHTML = `₹${updatedPrice.toFixed(2)}`;
          row.querySelector('.actions-cell').innerHTML = `
            <button class="btn btn-edit" onclick="window.startEdit(${productId})">✏️ Edit</button>
            <button class="btn btn-delete" onclick="window.confirmDelete(${productId}, '${escapeHtml(updatedTitle)}', '${escapeHtml(allProducts[productIndex]?.image_url || '')}')">🗑️ Delete</button>
          `;
          showToast('✅ Product updated!');
        } catch {
          showToast('Update failed', 'error');
          saveBtn.textContent = '💾 Save';
          saveBtn.disabled = false;
        }
      };

      // --------------------------------------------------------------
      // DELETE PRODUCT
      // --------------------------------------------------------------
      window.confirmDelete = function(productId, productTitle, imageUrl) {
        showDeleteModal(productId, productTitle, imageUrl);
      };

      // --------------------------------------------------------------
      // HELPERS
      // --------------------------------------------------------------
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      function showState(state) {
        loadingState.style.display = 'none';
        errorState.style.display = 'none';
        emptyState.style.display = 'none';
        tableContainer.style.display = 'none';
        if (state === 'loading') loadingState.style.display = 'block';
        else if (state === 'error') errorState.style.display = 'block';
        else if (state === 'empty') emptyState.style.display = 'block';
        else if (state === 'table') tableContainer.style.display = 'block';
      }

      function handleLogout() {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace(LOGIN_PATH);
      }

      // --------------------------------------------------------------
      // INIT
      // --------------------------------------------------------------
      async function init() {
        document.getElementById('logoutButton').addEventListener('click', handleLogout);
        setInterval(() => { if (!hasValidSession()) handleLogout(); }, 5000);
        const configOk = await fetchConfig();
        if (configOk) await fetchProducts();
        else showState('error');
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
