<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Admin Panel</title>
  <style>
    /* ----- HIDE EVERYTHING UNTIL AUTH VERIFIED ----- */
    html:not(.auth-verified) body {
      display: none !important;
    }

    html.auth-verified body {
      display: flex !important;
      flex-direction: column;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c1419;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #e3e9e5;
    }

    /* ----- HEADER ----- */
    .dashboard-header {
      background: rgba(18, 25, 30, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(45, 212, 191, 0.2);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .dashboard-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0f5f2;
    }

    .badge {
      background: rgba(45, 212, 191, 0.15);
      color: #5ee3d0;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }

    /* ----- BUTTONS ----- */
    .btn {
      padding: 0.6rem 1.3rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
    }

    .btn-add {
      background: #14b8a6;
      color: #0a1c1a;
    }

    .btn-add:hover {
      background: #2dd4bf;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(20, 184, 166, 0.3);
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .btn-edit {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-edit:hover {
      background: rgba(59, 130, 246, 0.3);
    }

    .btn-save {
      background: #22c55e;
      color: white;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-save:hover {
      background: #16a34a;
    }

    .btn-cancel {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
      border: 1px solid rgba(107, 114, 128, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-cancel:hover {
      background: rgba(107, 114, 128, 0.4);
    }

    /* ----- MAIN CONTAINER ----- */
    .main-container {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ----- TABLE ----- */
    .table-wrapper {
      background: rgba(18, 25, 30, 0.9);
      border: 1px solid rgba(70, 130, 120, 0.2);
      border-radius: 1.5rem;
      overflow-x: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead {
      background: rgba(30, 180, 150, 0.08);
      border-bottom: 2px solid rgba(45, 212, 191, 0.2);
    }

    th {
      padding: 1rem 1.2rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #9abfb5;
      font-weight: 700;
    }

    td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid rgba(70, 130, 120, 0.1);
      font-size: 0.9rem;
      color: #d1d5db;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(30, 180, 150, 0.05);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* ----- EDITABLE INPUTS ----- */
    .editable-input {
      background: #162026;
      border: 1px solid #2f4247;
      color: #ebf2ef;
      padding: 0.5rem 0.7rem;
      border-radius: 0.6rem;
      font-size: 0.85rem;
      width: 100%;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .editable-input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
    }

    .actions-cell {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .product-thumb {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 0.5rem;
      background: #1a272e;
    }

    .no-image {
      width: 50px;
      height: 50px;
      background: rgba(45, 212, 191, 0.1);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    /* ----- LOADING / ERROR ----- */
    .loading-container {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(45, 212, 191, 0.2);
      border-top-color: #2dd4bf;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #22c55e;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #6b8780;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .main-container {
        padding: 1rem;
      }
      
      th, td {
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- ----- HEADER ----- -->
  <header class="dashboard-header">
    <div class="header-left">
      <h1 class="dashboard-title">📊 Product Dashboard</h1>
      <span class="badge">Admin Panel</span>
    </div>
    <div style="display: flex; gap: 0.8rem; align-items: center;">
      <a href="/admin/dashboard/add-product" class="btn btn-add">➕ Add Product</a>
      <button class="btn btn-logout" id="logoutButton">🚪 Logout</button>
    </div>
  </header>

  <!-- ----- MAIN CONTENT ----- -->
  <main class="main-container">
    <!-- Loading -->
    <div id="loadingState" class="loading-container">
      <div class="spinner"></div>
      <p style="color: #6b8780;">Loading products...</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="loading-container" style="display: none;">
      <p style="color: #fca5a5;">❌ Failed to load products</p>
      <button class="btn btn-add" onclick="location.reload()" style="margin-top: 1rem;">🔄 Retry</button>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="loading-container" style="display: none;">
      <p style="color: #6b8780;">📦 No products yet</p>
      <a href="/admin/dashboard/add-product" class="btn btn-add" style="margin-top: 1rem;">➕ Add Your First Product</a>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="table-wrapper" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Title</th>
            <th>Description</th>
            <th>Price (₹)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="success-toast" style="display: none;"></div>

  <script>
    (function() {
      'use strict';

      // --------------------------------------------------------------
      // 🛡️ SESSION PROTECTION
      // --------------------------------------------------------------
      const SESSION_KEY = 'grocery_admin_session';
      const LOGIN_PATH = '/admin';

      function hasValidSession() {
        try {
          const sessionData = localStorage.getItem(SESSION_KEY);
          if (!sessionData) return false;
          const parsed = JSON.parse(sessionData);
          if (!parsed || parsed.loggedIn !== true || !parsed.timestamp) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          const SESSION_MAX_AGE = 24 * 60 * 60 * 1000;
          if (Date.now() - parsed.timestamp > SESSION_MAX_AGE) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          return true;
        } catch (e) {
          localStorage.removeItem(SESSION_KEY);
          return false;
        }
      }

      if (!hasValidSession()) {
        window.location.replace(LOGIN_PATH);
        throw new Error('Unauthorized');
      }

      document.documentElement.classList.add('auth-verified');

      // --------------------------------------------------------------
      // 🔧 SUPABASE CONFIG
      // --------------------------------------------------------------
      let supabaseUrl = null;
      let supabaseAnonKey = null;
      const TABLE_NAME = 'product';

      // DOM elements
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const emptyState = document.getElementById('emptyState');
      const tableContainer = document.getElementById('tableContainer');
      const tableBody = document.getElementById('tableBody');
      const toast = document.getElementById('toast');

      // Track which row is being edited
      let editingRowId = null;
      let allProducts = [];

      // --------------------------------------------------------------
      // TOAST
      // --------------------------------------------------------------
      function showToast(message) {
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 2500);
      }

      // --------------------------------------------------------------
      // FETCH CONFIG
      // --------------------------------------------------------------
      async function fetchConfig() {
        try {
          const response = await fetch('/api/config');
          if (!response.ok) throw new Error('Config failed');
          const config = await response.json();
          supabaseUrl = config.supabaseUrl;
          supabaseAnonKey = config.supabaseAnonKey;
          return true;
        } catch (e) {
          console.error('Config error:', e);
          return false;
        }
      }

      // --------------------------------------------------------------
      // FETCH PRODUCTS
      // --------------------------------------------------------------
      async function fetchProducts() {
        try {
          showState('loading');

          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?select=*&order=id.asc`, {
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
            },
          });

          if (!response.ok) throw new Error('Failed to fetch');

          const products = await response.json();
          allProducts = products;

          if (!products || products.length === 0) {
            showState('empty');
            return;
          }

          renderTable(products);
          showState('table');

        } catch (e) {
          console.error('Fetch error:', e);
          showState('error');
        }
      }

      // --------------------------------------------------------------
      // RENDER TABLE
      // --------------------------------------------------------------
      function renderTable(products) {
        tableBody.innerHTML = '';

        products.forEach(product => {
          const row = document.createElement('tr');
          row.setAttribute('data-id', product.id);
          row.innerHTML = `
            <td>#${product.id}</td>
            <td>
              ${product.image_url 
                ? `<img src="${escapeHtml(product.image_url)}" class="product-thumb" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>🥬</div>'">` 
                : '<div class="no-image">🥬</div>'}
            </td>
            <td class="cell-title">${escapeHtml(product.title || '—')}</td>
            <td class="cell-description">${escapeHtml(product.description || '—')}</td>
            <td class="cell-price">₹${parseFloat(product.price || 0).toFixed(2)}</td>
            <td class="actions-cell">
              <button class="btn btn-edit" onclick="window.startEdit(${product.id})">✏️ Edit</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      // --------------------------------------------------------------
      // START EDIT (called from onclick)
      // --------------------------------------------------------------
      window.startEdit = function(productId) {
        if (editingRowId !== null) {
          // Cancel any existing edit first
          window.cancelEdit(editingRowId);
        }

        editingRowId = productId;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;

        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;

        // Replace cells with inputs
        row.querySelector('.cell-title').innerHTML = `<input type="text" class="editable-input edit-title" value="${escapeHtml(product.title || '')}">`;
        row.querySelector('.cell-description').innerHTML = `<input type="text" class="editable-input edit-description" value="${escapeHtml(product.description || '')}">`;
        row.querySelector('.cell-price').innerHTML = `<input type="number" class="editable-input edit-price" value="${product.price || 0}" step="0.01">`;

        // Replace action buttons
        row.querySelector('.actions-cell').innerHTML = `
          <button class="btn btn-save" onclick="window.saveEdit(${productId})">💾 Save</button>
          <button class="btn btn-cancel" onclick="window.cancelEdit(${productId})">✖ Cancel</button>
        `;
      };

      // --------------------------------------------------------------
      // CANCEL EDIT
      // --------------------------------------------------------------
      window.cancelEdit = function(productId) {
        editingRowId = null;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;

        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;

        // Restore original values
        row.querySelector('.cell-title').innerHTML = escapeHtml(product.title || '—');
        row.querySelector('.cell-description').innerHTML = escapeHtml(product.description || '—');
        row.querySelector('.cell-price').innerHTML = `₹${parseFloat(product.price || 0).toFixed(2)}`;
        row.querySelector('.actions-cell').innerHTML = `<button class="btn btn-edit" onclick="window.startEdit(${productId})">✏️ Edit</button>`;
      };

      // --------------------------------------------------------------
      // SAVE EDIT
      // --------------------------------------------------------------
      window.saveEdit = async function(productId) {
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;

        const titleInput = row.querySelector('.edit-title');
        const descriptionInput = row.querySelector('.edit-description');
        const priceInput = row.querySelector('.edit-price');

        if (!titleInput || !descriptionInput || !priceInput) return;

        const updatedTitle = titleInput.value.trim();
        const updatedDescription = descriptionInput.value.trim();
        const updatedPrice = parseFloat(priceInput.value) || 0;

        if (!updatedTitle) {
          alert('Title is required!');
          return;
        }

        // Save button loading state
        const saveBtn = row.querySelector('.btn-save');
        saveBtn.textContent = '⏳ Saving...';
        saveBtn.disabled = true;

        try {
          // Update in Supabase
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?id=eq.${productId}`, {
            method: 'PATCH',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              title: updatedTitle,
              description: updatedDescription,
              price: updatedPrice,
            }),
          });

          if (!response.ok) {
            throw new Error('Update failed');
          }

          // Update local data
          const productIndex = allProducts.findIndex(p => p.id === productId);
          if (productIndex !== -1) {
            allProducts[productIndex].title = updatedTitle;
            allProducts[productIndex].description = updatedDescription;
            allProducts[productIndex].price = updatedPrice;
          }

          // Restore row to view mode
          editingRowId = null;
          row.querySelector('.cell-title').innerHTML = escapeHtml(updatedTitle);
          row.querySelector('.cell-description').innerHTML = escapeHtml(updatedDescription);
          row.querySelector('.cell-price').innerHTML = `₹${updatedPrice.toFixed(2)}`;
          row.querySelector('.actions-cell').innerHTML = `<button class="btn btn-edit" onclick="window.startEdit(${productId})">✏️ Edit</button>`;

          showToast('✅ Product updated successfully!');

        } catch (error) {
          console.error('Save error:', error);
          alert('Failed to update product. Please try again.');
          saveBtn.textContent = '💾 Save';
          saveBtn.disabled = false;
        }
      };

      // --------------------------------------------------------------
      // HELPERS
      // --------------------------------------------------------------
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function showState(state) {
        loadingState.style.display = 'none';
        errorState.style.display = 'none';
        emptyState.style.display = 'none';
        tableContainer.style.display = 'none';

        switch (state) {
          case 'loading': loadingState.style.display = 'block'; break;
          case 'error': errorState.style.display = 'block'; break;
          case 'empty': emptyState.style.display = 'block'; break;
          case 'table': tableContainer.style.display = 'block'; break;
        }
      }

      // --------------------------------------------------------------
      // LOGOUT
      // --------------------------------------------------------------
      function handleLogout() {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace(LOGIN_PATH);
      }

      // --------------------------------------------------------------
      // INIT
      // --------------------------------------------------------------
      async function init() {
        document.getElementById('logoutButton').addEventListener('click', handleLogout);

        // Check session periodically
        setInterval(() => {
          if (!hasValidSession()) handleLogout();
        }, 5000);

        const configOk = await fetchConfig();
        if (configOk) {
          await fetchProducts();
        } else {
          showState('error');
        }
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
