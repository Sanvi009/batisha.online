<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Admin Panel</title>
  <style>
    /* ----- HIDE UNTIL AUTH VERIFIED ----- */
    html:not(.auth-verified) body {
      display: none !important;
    }

    html.auth-verified body {
      display: flex !important;
      flex-direction: column;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c1419;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #e3e9e5;
    }

    /* ----- HEADER ----- */
    .dashboard-header {
      background: rgba(18, 25, 30, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(45, 212, 191, 0.2);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .dashboard-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0f5f2;
    }

    .badge {
      background: rgba(45, 212, 191, 0.15);
      color: #5ee3d0;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(45, 212, 191, 0.3);
    }

    /* ----- BUTTONS ----- */
    .btn {
      padding: 0.6rem 1.3rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
    }

    .btn-add {
      background: #14b8a6;
      color: #0a1c1a;
    }

    .btn-add:hover {
      background: #2dd4bf;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(20, 184, 166, 0.3);
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .btn-edit {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-edit:hover {
      background: rgba(59, 130, 246, 0.3);
    }

    .btn-save {
      background: #22c55e;
      color: white;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-save:hover {
      background: #16a34a;
    }

    .btn-cancel {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
      border: 1px solid rgba(107, 114, 128, 0.3);
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
    }

    .btn-cancel:hover {
      background: rgba(107, 114, 128, 0.4);
    }

    .btn-submit {
      background: #14b8a6;
      color: #0a1c1a;
      padding: 0.7rem 2rem;
      font-size: 0.9rem;
    }

    .btn-submit:hover {
      background: #2dd4bf;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ----- MAIN CONTAINER ----- */
    .main-container {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ----- ADD PRODUCT FORM ----- */
    .form-container {
      background: rgba(18, 25, 30, 0.95);
      border: 1px solid rgba(45, 212, 191, 0.2);
      border-radius: 1.5rem;
      padding: 2rem;
      margin-bottom: 2rem;
      display: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .form-container.active {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0f5f2;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #9abfb5;
    }

    .form-input {
      background: #162026;
      border: 1px solid #2f4247;
      color: #ebf2ef;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 80px;
    }

    .file-upload-wrapper {
      position: relative;
    }

    .file-upload-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #162026;
      border: 2px dashed #2f4247;
      border-radius: 0.8rem;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #9abfb5;
    }

    .file-upload-label:hover {
      border-color: #2dd4bf;
      color: #5ee3d0;
    }

    .file-upload-label input[type="file"] {
      display: none;
    }

    .image-preview {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 0.8rem;
      margin-top: 0.5rem;
      display: none;
      border: 2px solid rgba(45, 212, 191, 0.3);
    }

    .image-preview.active {
      display: block;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      grid-column: 1 / -1;
    }

    /* ----- TABLE ----- */
    .table-wrapper {
      background: rgba(18, 25, 30, 0.9);
      border: 1px solid rgba(70, 130, 120, 0.2);
      border-radius: 1.5rem;
      overflow-x: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead {
      background: rgba(30, 180, 150, 0.08);
      border-bottom: 2px solid rgba(45, 212, 191, 0.2);
    }

    th {
      padding: 1rem 1.2rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #9abfb5;
      font-weight: 700;
    }

    td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid rgba(70, 130, 120, 0.1);
      font-size: 0.9rem;
      color: #d1d5db;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(30, 180, 150, 0.05);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .editable-input {
      background: #162026;
      border: 1px solid #2f4247;
      color: #ebf2ef;
      padding: 0.5rem 0.7rem;
      border-radius: 0.6rem;
      font-size: 0.85rem;
      width: 100%;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .editable-input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
    }

    .actions-cell {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .product-thumb {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 0.5rem;
      background: #1a272e;
    }

    .no-image {
      width: 50px;
      height: 50px;
      background: rgba(45, 212, 191, 0.1);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .loading-container {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(45, 212, 191, 0.2);
      border-top-color: #2dd4bf;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      animation: slideIn 0.3s ease;
      z-index: 1000;
      display: none;
      color: white;
    }

    .toast.success { background: #22c55e; }
    .toast.error { background: #ef4444; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #6b8780;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .main-container {
        padding: 1rem;
      }
      
      th, td {
        padding: 0.6rem 0.8rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- ----- HEADER ----- -->
  <header class="dashboard-header">
    <div class="header-left">
      <h1 class="dashboard-title">📊 Product Dashboard</h1>
      <span class="badge">Admin Panel</span>
    </div>
    <div style="display: flex; gap: 0.8rem; align-items: center;">
      <button class="btn btn-add" id="toggleFormBtn">➕ Add Product</button>
      <button class="btn btn-logout" id="logoutButton">🚪 Logout</button>
    </div>
  </header>

  <!-- ----- MAIN CONTENT ----- -->
  <main class="main-container">
    <!-- Add Product Form -->
    <div id="addProductForm" class="form-container">
      <h2 class="form-title">📦 Add New Product</h2>
      <form id="productForm" class="form-grid">
        <div class="form-group">
          <label for="productTitle">Title *</label>
          <input type="text" id="productTitle" class="form-input" placeholder="Product name" required>
        </div>
        
        <div class="form-group">
          <label for="productPrice">Price (₹) *</label>
          <input type="number" id="productPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required>
        </div>
        
        <div class="form-group full-width">
          <label for="productDescription">Description</label>
          <textarea id="productDescription" class="form-input" placeholder="Product description..."></textarea>
        </div>
        
        <div class="form-group full-width">
          <label>Product Image</label>
          <div class="file-upload-wrapper">
            <label class="file-upload-label" for="productImage">
              📁 Choose Image
              <input type="file" id="productImage" accept="image/*">
            </label>
            <span id="fileName" style="color: #9abfb5; font-size: 0.85rem; margin-left: 0.5rem;"></span>
          </div>
          <img id="imagePreview" class="image-preview" src="" alt="Preview">
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn btn-submit" id="submitBtn">💾 Save Product</button>
          <button type="button" class="btn btn-cancel" id="cancelFormBtn">✖ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="loading-container">
      <div class="spinner"></div>
      <p style="color: #6b8780;">Loading products...</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="loading-container" style="display: none;">
      <p style="color: #fca5a5;">❌ Failed to load products</p>
      <button class="btn btn-add" onclick="location.reload()" style="margin-top: 1rem;">🔄 Retry</button>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="loading-container" style="display: none;">
      <p style="color: #6b8780;">📦 No products yet</p>
      <button class="btn btn-add" id="emptyAddBtn" style="margin-top: 1rem;">➕ Add Your First Product</button>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="table-wrapper" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Title</th>
            <th>Description</th>
            <th>Price (₹)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    (function() {
      'use strict';

      // --------------------------------------------------------------
      // 🛡️ SESSION PROTECTION
      // --------------------------------------------------------------
      const SESSION_KEY = 'grocery_admin_session';
      const LOGIN_PATH = '/admin';

      function hasValidSession() {
        try {
          const sessionData = localStorage.getItem(SESSION_KEY);
          if (!sessionData) return false;
          const parsed = JSON.parse(sessionData);
          if (!parsed || parsed.loggedIn !== true || !parsed.timestamp) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          if (Date.now() - parsed.timestamp > 24 * 60 * 60 * 1000) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          return true;
        } catch (e) {
          localStorage.removeItem(SESSION_KEY);
          return false;
        }
      }

      if (!hasValidSession()) {
        window.location.replace(LOGIN_PATH);
        throw new Error('Unauthorized');
      }

      document.documentElement.classList.add('auth-verified');

      // --------------------------------------------------------------
      // 🔧 CONFIG
      // --------------------------------------------------------------
      let supabaseUrl = null;
      let supabaseAnonKey = null;
      const TABLE_NAME = 'product';
      const BUCKET_NAME = 'product';

      const addProductForm = document.getElementById('addProductForm');
      const productForm = document.getElementById('productForm');
      const toggleFormBtn = document.getElementById('toggleFormBtn');
      const cancelFormBtn = document.getElementById('cancelFormBtn');
      const emptyAddBtn = document.getElementById('emptyAddBtn');
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const emptyState = document.getElementById('emptyState');
      const tableContainer = document.getElementById('tableContainer');
      const tableBody = document.getElementById('tableBody');
      const toast = document.getElementById('toast');
      const imagePreview = document.getElementById('imagePreview');
      const fileName = document.getElementById('fileName');
      const productImage = document.getElementById('productImage');
      const submitBtn = document.getElementById('submitBtn');

      let editingRowId = null;
      let allProducts = [];
      let selectedFile = null;

      // --------------------------------------------------------------
      // TOAST
      // --------------------------------------------------------------
      function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // --------------------------------------------------------------
      // CONFIG
      // --------------------------------------------------------------
      async function fetchConfig() {
        try {
          const response = await fetch('/api/config');
          if (!response.ok) throw new Error('Config failed');
          const config = await response.json();
          supabaseUrl = config.supabaseUrl;
          supabaseAnonKey = config.supabaseAnonKey;
          return true;
        } catch (e) {
          showToast('Failed to load configuration', 'error');
          return false;
        }
      }

      // --------------------------------------------------------------
      // FETCH PRODUCTS
      // --------------------------------------------------------------
      async function fetchProducts() {
        try {
          showState('loading');
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?select=*&order=id.asc`, {
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
            },
          });
          if (!response.ok) throw new Error('Fetch failed');
          const products = await response.json();
          allProducts = products;
          if (!products || products.length === 0) {
            showState('empty');
            return;
          }
          renderTable(products);
          showState('table');
        } catch (e) {
          showState('error');
        }
      }

      // --------------------------------------------------------------
      // RENDER TABLE
      // --------------------------------------------------------------
      function renderTable(products) {
        tableBody.innerHTML = '';
        products.forEach(product => {
          const row = document.createElement('tr');
          row.setAttribute('data-id', product.id);
          row.innerHTML = `
            <td>#${product.id}</td>
            <td>${product.image_url ? `<img src="${escapeHtml(product.image_url)}" class="product-thumb" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>🥬</div>'">` : '<div class="no-image">🥬</div>'}</td>
            <td class="cell-title">${escapeHtml(product.title || '—')}</td>
            <td class="cell-description">${escapeHtml(product.description || '—')}</td>
            <td class="cell-price">₹${parseFloat(product.price || 0).toFixed(2)}</td>
            <td class="actions-cell">
              <button class="btn btn-edit" onclick="window.startEdit(${product.id})">✏️ Edit</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      // --------------------------------------------------------------
      // IMAGE UPLOAD
      // --------------------------------------------------------------
      async function uploadImage(file) {
        const timestamp = Date.now();
        const fileExt = file.name.split('.').pop();
        const fileName = `${timestamp}-${Math.random().toString(36).substring(2, 8)}.${fileExt}`;
        const filePath = `${fileName}`;

        const response = await fetch(`${supabaseUrl}/storage/v1/object/${BUCKET_NAME}/${filePath}`, {
          method: 'POST',
          headers: {
            'apikey': supabaseAnonKey,
            'Authorization': `Bearer ${supabaseAnonKey}`,
            'Content-Type': file.type,
          },
          body: file,
        });

        if (!response.ok) {
          const error = await response.text();
          throw new Error(`Upload failed: ${error}`);
        }

        // Return public URL
        return `${supabaseUrl}/storage/v1/object/public/${BUCKET_NAME}/${filePath}`;
      }

      // --------------------------------------------------------------
      // ADD PRODUCT
      // --------------------------------------------------------------
      productForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('productTitle').value.trim();
        const price = parseFloat(document.getElementById('productPrice').value) || 0;
        const description = document.getElementById('productDescription').value.trim();

        if (!title) {
          showToast('Title is required!', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Saving...';

        try {
          let imageUrl = null;

          // Upload image if selected
          if (selectedFile) {
            imageUrl = await uploadImage(selectedFile);
          }

          // Insert into Supabase
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}`, {
            method: 'POST',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              title: title,
              price: price,
              description: description,
              image_url: imageUrl,
            }),
          });

          if (!response.ok) {
            const error = await response.text();
            throw new Error(`Insert failed: ${error}`);
          }

          showToast('✅ Product added successfully!');
          
          // Reset form
          productForm.reset();
          selectedFile = null;
          imagePreview.classList.remove('active');
          imagePreview.src = '';
          fileName.textContent = '';
          
          // Hide form and refresh
          addProductForm.classList.remove('active');
          toggleFormBtn.textContent = '➕ Add Product';
          
          // Refresh products
          await fetchProducts();

        } catch (error) {
          console.error('Error:', error);
          showToast('Failed to add product: ' + error.message, 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '💾 Save Product';
        }
      });

      // --------------------------------------------------------------
      // TOGGLE FORM
      // --------------------------------------------------------------
      function showForm() {
        addProductForm.classList.add('active');
        toggleFormBtn.textContent = '✖ Close Form';
        document.getElementById('productTitle').focus();
      }

      function hideForm() {
        addProductForm.classList.remove('active');
        toggleFormBtn.textContent = '➕ Add Product';
        productForm.reset();
        selectedFile = null;
        imagePreview.classList.remove('active');
        imagePreview.src = '';
        fileName.textContent = '';
      }

      toggleFormBtn.addEventListener('click', () => {
        if (addProductForm.classList.contains('active')) {
          hideForm();
        } else {
          showForm();
        }
      });

      cancelFormBtn.addEventListener('click', hideForm);
      
      if (emptyAddBtn) {
        emptyAddBtn.addEventListener('click', showForm);
      }

      // Image preview
      productImage.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          selectedFile = file;
          fileName.textContent = file.name;
          const reader = new FileReader();
          reader.onload = (event) => {
            imagePreview.src = event.target.result;
            imagePreview.classList.add('active');
          };
          reader.readAsDataURL(file);
        } else {
          selectedFile = null;
          fileName.textContent = '';
          imagePreview.classList.remove('active');
          imagePreview.src = '';
        }
      });

      // --------------------------------------------------------------
      // EDIT PRODUCT
      // --------------------------------------------------------------
      window.startEdit = function(productId) {
        if (editingRowId !== null) {
          window.cancelEdit(editingRowId);
        }
        editingRowId = productId;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;

        row.querySelector('.cell-title').innerHTML = `<input type="text" class="editable-input edit-title" value="${escapeHtml(product.title || '')}">`;
        row.querySelector('.cell-description').innerHTML = `<input type="text" class="editable-input edit-description" value="${escapeHtml(product.description || '')}">`;
        row.querySelector('.cell-price').innerHTML = `<input type="number" class="editable-input edit-price" value="${product.price || 0}" step="0.01">`;
        row.querySelector('.actions-cell').innerHTML = `
          <button class="btn btn-save" onclick="window.saveEdit(${productId})">💾 Save</button>
          <button class="btn btn-cancel" onclick="window.cancelEdit(${productId})">✖ Cancel</button>
        `;
      };

      window.cancelEdit = function(productId) {
        editingRowId = null;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;

        row.querySelector('.cell-title').innerHTML = escapeHtml(product.title || '—');
        row.querySelector('.cell-description').innerHTML = escapeHtml(product.description || '—');
        row.querySelector('.cell-price').innerHTML = `₹${parseFloat(product.price || 0).toFixed(2)}`;
        row.querySelector('.actions-cell').innerHTML = `<button class="btn btn-edit" onclick="window.startEdit(${productId})">✏️ Edit</button>`;
      };

      window.saveEdit = async function(productId) {
        const row = document.querySelector(`tr[data-id="${productId}"]`);
        if (!row) return;

        const titleInput = row.querySelector('.edit-title');
        const descriptionInput = row.querySelector('.edit-description');
        const priceInput = row.querySelector('.edit-price');

        if (!titleInput || !priceInput) return;

        const updatedTitle = titleInput.value.trim();
        const updatedDescription = descriptionInput ? descriptionInput.value.trim() : '';
        const updatedPrice = parseFloat(priceInput.value) || 0;

        if (!updatedTitle) {
          showToast('Title is required!', 'error');
          return;
        }

        const saveBtn = row.querySelector('.btn-save');
        saveBtn.textContent = '⏳...';
        saveBtn.disabled = true;

        try {
          const response = await fetch(`${supabaseUrl}/rest/v1/${TABLE_NAME}?id=eq.${productId}`, {
            method: 'PATCH',
            headers: {
              'apikey': supabaseAnonKey,
              'Authorization': `Bearer ${supabaseAnonKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              title: updatedTitle,
              description: updatedDescription,
              price: updatedPrice,
            }),
          });

          if (!response.ok) throw new Error('Update failed');

          const productIndex = allProducts.findIndex(p => p.id === productId);
          if (productIndex !== -1) {
            allProducts[productIndex].title = updatedTitle;
            allProducts[productIndex].description = updatedDescription;
            allProducts[productIndex].price = updatedPrice;
          }

          editingRowId = null;
          row.querySelector('.cell-title').innerHTML = escapeHtml(updatedTitle);
          row.querySelector('.cell-description').innerHTML = escapeHtml(updatedDescription);
          row.querySelector('.cell-price').innerHTML = `₹${updatedPrice.toFixed(2)}`;
          row.querySelector('.actions-cell').innerHTML = `<button class="btn btn-edit" onclick="window.startEdit(${productId})">✏️ Edit</button>`;

          showToast('✅ Product updated!');

        } catch (error) {
          showToast('Update failed', 'error');
          saveBtn.textContent = '💾 Save';
          saveBtn.disabled = false;
        }
      };

      // --------------------------------------------------------------
      // HELPERS
      // --------------------------------------------------------------
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function showState(state) {
        loadingState.style.display = 'none';
        errorState.style.display = 'none';
        emptyState.style.display = 'none';
        tableContainer.style.display = 'none';
        switch (state) {
          case 'loading': loadingState.style.display = 'block'; break;
          case 'error': errorState.style.display = 'block'; break;
          case 'empty': emptyState.style.display = 'block'; break;
          case 'table': tableContainer.style.display = 'block'; break;
        }
      }

      function handleLogout() {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace(LOGIN_PATH);
      }

      // --------------------------------------------------------------
      // INIT
      // --------------------------------------------------------------
      async function init() {
        document.getElementById('logoutButton').addEventListener('click', handleLogout);
        setInterval(() => { if (!hasValidSession()) handleLogout(); }, 5000);

        const configOk = await fetchConfig();
        if (configOk) await fetchProducts();
        else showState('error');
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
