<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders · Batisha admin</title>
  <style>
    /* ----- HIDE UNTIL AUTH VERIFIED ----- */
    html:not(.auth-verified) body {
      display: none !important;
    }

    html.auth-verified body {
      display: flex !important;
      flex-direction: column;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f8f7;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
      color: #1e2b3a;
    }

    /* ----- HEADER (matches main site) ----- */
    .dashboard-header {
      background: #ffffff;
      border-bottom: 1px solid #eaeef3;
      padding: 0.7rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: #1f2a3a;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #1e6b3e, #2b7a4a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(30, 107, 62, 0.12);
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
      display: block;
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1f2a3a;
    }
    .logo-text span {
      font-weight: 400;
      color: #4b6b5e;
      font-size: 0.8rem;
      margin-left: 0.1rem;
    }

    .dashboard-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a3428;
      margin-left: 0.5rem;
    }

    .badge {
      background: #f0f8f2;
      color: #1f8b4c;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1px solid #dce8e2;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    /* ----- NAV LINKS (admin navigation) ----- */
    .admin-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .admin-nav a {
      text-decoration: none;
      color: #2f3e4e;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      transition: 0.15s;
    }
    .admin-nav a:hover {
      background: #f0f8f2;
      color: #0f6e3a;
    }
    .admin-nav a.active {
      background: #f0f8f2;
      color: #0f6e3a;
      font-weight: 600;
    }

    /* ----- BUTTONS ----- */
    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.15s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      text-decoration: none;
    }

    .btn-logout {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .btn-logout:hover {
      background: #fee2e2;
    }

    .btn-view {
      background: #f0f5fc;
      color: #1e3a5f;
      border: 1px solid #dde5ed;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-view:hover {
      background: #e4edf7;
    }

    .btn-deliver {
      background: #f0fdf4;
      color: #0f6e3a;
      border: 1px solid #bbf7d0;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-deliver:hover {
      background: #dcfce7;
    }

    .btn-cancel-order {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-cancel-order:hover {
      background: #fee2e2;
    }

    .btn-delete-order {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      padding: 0.3rem 0.9rem;
      font-size: 0.75rem;
    }
    .btn-delete-order:hover {
      background: #fee2e2;
      opacity: 0.8;
    }

    /* ----- STATS CARDS (clean, white) ----- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 12px;
      padding: 1.5rem 1.2rem;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: #1a3428;
    }
    .stat-number.green {
      color: #0f6e3a;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #4b5f53;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.2rem;
      font-weight: 600;
    }

    /* ----- TABLE (clean, white) ----- */
    .table-wrapper {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 16px;
      overflow-x: auto;
      box-shadow: 0 1px 6px rgba(0,0,0,0.02);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    thead {
      background: #f8fbf9;
      border-bottom: 1px solid #eef2f6;
    }
    th {
      padding: 0.8rem 1.2rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #4b5f53;
      font-weight: 600;
    }
    td {
      padding: 0.7rem 1.2rem;
      border-bottom: 1px solid #f0f5f2;
      font-size: 0.85rem;
      color: #1e2b3a;
      vertical-align: middle;
    }
    tbody tr:hover {
      background: #f8fbf9;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }

    /* ----- STATUS BADGES ----- */
    .status-badge {
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: inline-block;
    }
    .status-pending {
      background: #fefce8;
      color: #a16207;
      border: 1px solid #fde68a;
    }
    .status-confirmed {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }
    .status-delivered {
      background: #f0fdf4;
      color: #0f6e3a;
      border: 1px solid #bbf7d0;
    }
    .status-cancelled {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* ----- MODAL (clean, white) ----- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      max-width: 700px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      border: 1px solid #eef2f6;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a3428;
    }
    .modal-close {
      background: none;
      border: none;
      color: #4b5f53;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.3rem;
      transition: 0.15s;
    }
    .modal-close:hover {
      color: #991b1b;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f0f5f2;
    }
    .info-label {
      color: #4b5f53;
      font-size: 0.85rem;
    }
    .info-value {
      color: #1e2b3a;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .order-items-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.2rem;
      min-width: auto;
    }
    .order-items-table th {
      background: #f8fbf9;
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #4b5f53;
    }
    .order-items-table td {
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      border-bottom: 1px solid #f0f5f2;
    }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    /* ----- LOADING / EMPTY / ERROR ----- */
    .loading-container {
      text-align: center;
      padding: 3rem;
      color: #4b5f53;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2ebe6;
      border-top-color: #1f8b4c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 500;
      animation: slideIn 0.3s ease;
      z-index: 1000;
      display: none;
      color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .toast.success { background: #1f8b4c; }
    .toast.error { background: #dc2626; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ----- MOBILE ----- */
    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        align-items: stretch;
        padding: 0.8rem 1rem;
      }
      .header-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      .header-right {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
      }
      .admin-nav {
        flex-wrap: wrap;
        gap: 0.3rem;
      }
      .main-container {
        padding: 1rem;
      }
      th, td {
        padding: 0.5rem 0.8rem;
        font-size: 0.75rem;
      }
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- ----- HEADER ----- -->
  <header class="dashboard-header">
    <div class="header-left">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 10v-2a6 6 0 0 1 12 0v2h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2h4zm2 0h8v-2a4 4 0 0 0-8 0v2zm-2 2v2h2v-2h-2zm4 0v2h4v-2h-4zm8 0v2h2v-2h-2zM8 14v2h2v-2H8zm16 0v2h2v-2h-2zM8 18v8h16v-8H8z"/>
          </svg>
        </div>
        <span class="logo-text">Batisha <span>online</span></span>
      </a>
      <span class="dashboard-title">📋 Orders</span>
      <span class="badge">Admin</span>
    </div>

    <div class="header-right">
      <nav class="admin-nav">
        <a href="/admin/dashboard">📊 Products</a>
        <a href="/admin/orders" class="active">📦 Orders</a>
      </nav>
      <button class="btn btn-logout" id="logoutButton">🚪 Logout</button>
    </div>
  </header>

  <!-- ----- MAIN CONTENT ----- -->
  <main class="main-container">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green" id="statDelivered">0</div>
        <div class="stat-label">Delivered</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green" id="statRevenue">৳0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="loading-container">
      <div class="spinner"></div>
      <p>Loading orders...</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="loading-container" style="display: none;">
      <p style="color: #991b1b;">❌ Failed to load orders</p>
      <button class="btn btn-view" onclick="location.reload()" style="margin-top: 1rem;">🔄 Retry</button>
    </div>

    <!-- Empty -->
    <div id="emptyState" class="loading-container" style="display: none;">
      <p style="color: #4b5f53;">📦 No orders yet</p>
    </div>

    <!-- Table -->
    <div id="tableContainer" class="table-wrapper" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Order Detail Modal -->
  <div id="orderDetailModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="modalOrderTitle">Order Details</h3>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <div id="modalContent"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    (function() {
      'use strict';

      // --------------------------------------------------------------
      // 🛡️ SESSION PROTECTION
      // --------------------------------------------------------------
      const SESSION_KEY = 'grocery_admin_session';
      const LOGIN_PATH = '/admin';

      function hasValidSession() {
        try {
          const sessionData = localStorage.getItem(SESSION_KEY);
          if (!sessionData) return false;
          const parsed = JSON.parse(sessionData);
          if (!parsed || parsed.loggedIn !== true || !parsed.timestamp) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          if (Date.now() - parsed.timestamp > 24 * 60 * 60 * 1000) {
            localStorage.removeItem(SESSION_KEY);
            return false;
          }
          return true;
        } catch {
          localStorage.removeItem(SESSION_KEY);
          return false;
        }
      }

      if (!hasValidSession()) {
        window.location.replace(LOGIN_PATH);
        throw new Error('Unauthorized');
      }

      document.documentElement.classList.add('auth-verified');

      // --------------------------------------------------------------
      // CONFIG
      // --------------------------------------------------------------
      let supabaseUrl = null;
      let supabaseAnonKey = null;

      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const emptyState = document.getElementById('emptyState');
      const tableContainer = document.getElementById('tableContainer');
      const tableBody = document.getElementById('tableBody');
      const toast = document.getElementById('toast');
      const orderDetailModal = document.getElementById('orderDetailModal');
      const modalContent = document.getElementById('modalContent');
      const modalActions = document.getElementById('modalActions');
      const modalOrderTitle = document.getElementById('modalOrderTitle');
      const modalCloseBtn = document.getElementById('modalCloseBtn');

      let allOrders = [];

      // --------------------------------------------------------------
      // TOAST
      // --------------------------------------------------------------
      function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // --------------------------------------------------------------
      // FETCH CONFIG
      // --------------------------------------------------------------
      async function fetchConfig() {
        try {
          const response = await fetch('/api/config');
          if (!response.ok) throw new Error('Config failed');
          const config = await response.json();
          supabaseUrl = config.supabaseUrl;
          supabaseAnonKey = config.supabaseAnonKey;
          return true;
        } catch {
          showToast('Failed to load configuration', 'error');
          return false;
        }
      }

      // --------------------------------------------------------------
      // FETCH ORDERS
      // --------------------------------------------------------------
      async function fetchOrders() {
        try {
          showState('loading');

          const response = await fetch(
            `${supabaseUrl}/rest/v1/orders?select=*&order=created_at.desc`,
            {
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
              },
            }
          );

          if (!response.ok) throw new Error('Fetch failed');

          const orders = await response.json();
          allOrders = orders;

          if (!orders || orders.length === 0) {
            showState('empty');
            updateStats([]);
            return;
          }

          renderTable(orders);
          updateStats(orders);
          showState('table');

        } catch {
          showState('error');
        }
      }

      // --------------------------------------------------------------
      // FETCH ORDER ITEMS
      // --------------------------------------------------------------
      async function fetchOrderItems(orderId) {
        try {
          const response = await fetch(
            `${supabaseUrl}/rest/v1/order_items?order_id=eq.${orderId}&select=*`,
            {
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
              },
            }
          );
          if (!response.ok) throw new Error('Failed to fetch items');
          return await response.json();
        } catch {
          return [];
        }
      }

      // --------------------------------------------------------------
      // RENDER TABLE
      // --------------------------------------------------------------
      function renderTable(orders) {
        tableBody.innerHTML = '';

        orders.forEach(order => {
          const row = document.createElement('tr');
          const date = new Date(order.created_at).toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric'
          });

          row.innerHTML = `
            <td><strong>#${order.id}</strong></td>
            <td>${escapeHtml(order.customer_name)}</td>
            <td>${escapeHtml(order.customer_phone)}</td>
            <td>—</td>
            <td><strong>৳${parseFloat(order.total_price).toFixed(2)}</strong></td>
            <td><span class="status-badge status-${order.status}">${order.status}</span></td>
            <td>${date}</td>
            <td>
              <button class="btn btn-view" onclick="window.viewOrder(${order.id})">👁️ View</button>
              ${order.status === 'pending' ? `<button class="btn btn-deliver" onclick="window.markDelivered(${order.id})">✅ Deliver</button>` : ''}
              <button class="btn btn-delete-order" onclick="window.deleteOrder(${order.id})">🗑️ Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });

        // Update item counts asynchronously
        updateItemCounts(orders);
      }

      async function updateItemCounts(orders) {
        for (const order of orders) {
          const items = await fetchOrderItems(order.id);
          const row = Array.from(tableBody.children).find((r, i) => orders[i]?.id === order.id);
          if (!row) continue;
          
          const itemsCell = row.querySelector('td:nth-child(4)');
          if (itemsCell) {
            const totalItems = items.reduce((sum, item) => sum + item.quantity, 0);
            itemsCell.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
          }
        }
      }

      // --------------------------------------------------------------
      // STATS
      // --------------------------------------------------------------
      function updateStats(orders) {
        document.getElementById('statTotal').textContent = orders.length;
        document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;
        document.getElementById('statDelivered').textContent = orders.filter(o => o.status === 'delivered').length;
        
        const revenue = orders
          .filter(o => o.status !== 'cancelled')
          .reduce((sum, o) => sum + parseFloat(o.total_price), 0);
        document.getElementById('statRevenue').textContent = `৳${revenue.toFixed(2)}`;
      }

      // --------------------------------------------------------------
      // VIEW ORDER DETAILS
      // --------------------------------------------------------------
      window.viewOrder = async function(orderId) {
        const order = allOrders.find(o => o.id === orderId);
        if (!order) return;

        const items = await fetchOrderItems(orderId);
        const date = new Date(order.created_at).toLocaleString('en-IN', {
          day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        modalOrderTitle.textContent = `Order #${orderId}`;

        modalContent.innerHTML = `
          <div class="info-row">
            <span class="info-label">Customer</span>
            <span class="info-value">${escapeHtml(order.customer_name)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Phone</span>
            <span class="info-value">${escapeHtml(order.customer_phone)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Address</span>
            <span class="info-value">${escapeHtml(order.customer_address)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Date</span>
            <span class="info-value">${date}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value"><span class="status-badge status-${order.status}">${order.status}</span></span>
          </div>
          <div class="info-row">
            <span class="info-label">Total</span>
            <span class="info-value" style="color: #0f6e3a; font-size: 1.1rem;">৳${parseFloat(order.total_price).toFixed(2)}</span>
          </div>

          <h4 style="color: #1a3428; margin-top: 1.5rem; margin-bottom: 0.8rem;">📦 Order Items</h4>
          <table class="order-items-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(item => `
                <tr>
                  <td>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                      ${item.product_image_url ? `<img src="${escapeHtml(item.product_image_url)}" style="width:35px;height:35px;border-radius:8px;object-fit:contain;background:#f8fbf9;border:1px solid #eef2f6;">` : '🥬'}
                      ${escapeHtml(item.product_title)}
                    </div>
                  </td>
                  <td>৳${parseFloat(item.product_price).toFixed(2)}</td>
                  <td>×${item.quantity}</td>
                  <td><strong>৳${(item.product_price * item.quantity).toFixed(2)}</strong></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        // Actions
        modalActions.innerHTML = '';
        if (order.status === 'pending') {
          modalActions.innerHTML = `
            <button class="btn btn-deliver" onclick="window.markDeliveredFromModal(${orderId})">✅ Mark as Delivered</button>
            <button class="btn btn-cancel-order" onclick="window.cancelOrder(${orderId})">❌ Cancel Order</button>
          `;
        }
        modalActions.innerHTML += `
          <button class="btn btn-delete-order" onclick="window.deleteOrderFromModal(${orderId})">🗑️ Delete Order</button>
        `;

        orderDetailModal.style.display = 'flex';
      };

      // --------------------------------------------------------------
      // MARK AS DELIVERED
      // --------------------------------------------------------------
      window.markDelivered = async function(orderId) {
        if (!confirm('Mark this order as delivered?')) return;
        await updateOrderStatus(orderId, 'delivered');
      };

      window.markDeliveredFromModal = async function(orderId) {
        if (!confirm('Mark this order as delivered?')) return;
        await updateOrderStatus(orderId, 'delivered');
        orderDetailModal.style.display = 'none';
      };

      window.cancelOrder = async function(orderId) {
        if (!confirm('Are you sure you want to cancel this order?')) return;
        await updateOrderStatus(orderId, 'cancelled');
        orderDetailModal.style.display = 'none';
      };

      async function updateOrderStatus(orderId, newStatus) {
        try {
          const response = await fetch(
            `${supabaseUrl}/rest/v1/orders?id=eq.${orderId}`,
            {
              method: 'PATCH',
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ status: newStatus }),
            }
          );

          if (!response.ok) throw new Error('Update failed');

          const order = allOrders.find(o => o.id === orderId);
          if (order) order.status = newStatus;

          showToast(`✅ Order #${orderId} marked as ${newStatus}!`);
          fetchOrders();
        } catch {
          showToast('Failed to update status', 'error');
        }
      }

      // --------------------------------------------------------------
      // DELETE ORDER (with cascade)
      // --------------------------------------------------------------
      window.deleteOrder = async function(orderId) {
        if (!confirm(`⚠️ Are you sure you want to permanently delete order #${orderId}? This action cannot be undone.`)) return;
        await performDeleteOrder(orderId);
      };

      window.deleteOrderFromModal = async function(orderId) {
        if (!confirm(`⚠️ Are you sure you want to permanently delete order #${orderId}? This action cannot be undone.`)) return;
        await performDeleteOrder(orderId);
        orderDetailModal.style.display = 'none';
      };

      async function performDeleteOrder(orderId) {
        try {
          // Delete order_items first (cascade would handle if foreign key with ON DELETE CASCADE)
          // We delete explicitly for safety
          const deleteItemsResponse = await fetch(
            `${supabaseUrl}/rest/v1/order_items?order_id=eq.${orderId}`,
            {
              method: 'DELETE',
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
                'Content-Type': 'application/json',
              },
            }
          );

          if (!deleteItemsResponse.ok) throw new Error('Failed to delete order items');

          // Delete the order itself
          const deleteOrderResponse = await fetch(
            `${supabaseUrl}/rest/v1/orders?id=eq.${orderId}`,
            {
              method: 'DELETE',
              headers: {
                'apikey': supabaseAnonKey,
                'Authorization': `Bearer ${supabaseAnonKey}`,
                'Content-Type': 'application/json',
              },
            }
          );

          if (!deleteOrderResponse.ok) throw new Error('Failed to delete order');

          showToast(`🗑️ Order #${orderId} deleted successfully!`);
          fetchOrders();
        } catch (error) {
          console.error('Delete error:', error);
          showToast('Failed to delete order. Please try again.', 'error');
        }
      }

      // --------------------------------------------------------------
      // MODAL CLOSE
      // --------------------------------------------------------------
      modalCloseBtn.addEventListener('click', () => {
        orderDetailModal.style.display = 'none';
      });

      orderDetailModal.addEventListener('click', (e) => {
        if (e.target === orderDetailModal) {
          orderDetailModal.style.display = 'none';
        }
      });

      // --------------------------------------------------------------
      // HELPERS
      // --------------------------------------------------------------
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
      }

      function showState(state) {
        loadingState.style.display = 'none';
        errorState.style.display = 'none';
        emptyState.style.display = 'none';
        tableContainer.style.display = 'none';
        if (state === 'loading') loadingState.style.display = 'block';
        else if (state === 'error') errorState.style.display = 'block';
        else if (state === 'empty') emptyState.style.display = 'block';
        else if (state === 'table') tableContainer.style.display = 'block';
      }

      function handleLogout() {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace(LOGIN_PATH);
      }

      // --------------------------------------------------------------
      // INIT
      // --------------------------------------------------------------
      async function init() {
        document.getElementById('logoutButton').addEventListener('click', handleLogout);
        setInterval(() => { if (!hasValidSession()) handleLogout(); }, 5000);

        const configOk = await fetchConfig();
        if (configOk) await fetchOrders();
        else showState('error');
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
