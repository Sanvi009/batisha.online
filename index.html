<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Batisha">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Batisha online · fresh grocery</title>
  <style>
    /* --- RESET & BASE --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f8faf8; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      color: #1a2a3a; 
      line-height: 1.5; 
      -webkit-font-smoothing: antialiased; 
      padding-bottom: 80px; 
    }

    /* --- NAVBAR --- */
    .navbar { 
      background: rgba(255,255,255,0.92); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
      border-bottom: 1px solid #e8edf2; 
      padding: 0.8rem 1.2rem; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
    }
    .nav-container { 
      max-width: 1400px; 
      margin: 0 auto; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
    }
    .logo { 
      display: flex; 
      align-items: center; 
      gap: 0.8rem; 
      text-decoration: none; 
      color: #1a2a3a; 
    }
    .logo-image { 
      width: 68px; 
      height: 68px; 
      object-fit: contain; 
      border-radius: 8px; 
    }
    .logo-text { 
      font-size: 1.3rem; 
      font-weight: 700; 
      letter-spacing: -0.5px; 
    }
    .logo-text span { 
      font-weight: 400; 
      color: #4b6b5e; 
      font-size: 0.75rem; 
    }
    .nav-links { 
      display: flex; 
      align-items: center; 
      gap: 1.5rem; 
    }
    .nav-links a { 
      text-decoration: none; 
      font-weight: 500; 
      font-size: 0.85rem; 
      color: #2f3e4e; 
      transition: 0.2s; 
    }
    .nav-links a:hover { 
      color: #1f8b4c; 
    }
    .cart-pill { 
      background: #f0f5fc; 
      padding: 0.3rem 1rem 0.3rem 0.8rem; 
      border-radius: 40px; 
      font-weight: 500; 
      font-size: 0.8rem; 
      display: flex; 
      align-items: center; 
      gap: 0.4rem; 
      border: 1px solid #dde5ed; 
      transition: 0.2s; 
      color: #1a2a3a; 
    }
    .cart-pill:hover { 
      background: #e4edf7; 
      border-color: #b8cee0; 
    }
    .cart-pill span { 
      background: #1f8b4c; 
      color: white; 
      border-radius: 40px; 
      padding: 0.02rem 0.6rem; 
      font-size: 0.65rem; 
      font-weight: 600; 
    }
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 1.2rem 1.2rem 2rem; 
    }

    /* --- ANNOUNCEMENT TICKER (CLEAN CSS) --- */
    .announcement-wrapper {
      width: 100%;
      background: #fefce8;
      border-bottom: 1px solid #fde68a;
      padding: 0.4rem 0;
      overflow: hidden;
      display: none; /* Hidden by default, JS will show if active */
      position: relative;
      z-index: 99;
    }
    .announcement-track {
      display: flex;
      white-space: nowrap;
      animation: scrollText 25s linear infinite;
      width: max-content;
    }
    .announcement-track span {
      padding: 0 2rem;
      font-size: 0.8rem;
      color: #92400e;
      font-weight: 500;
    }
    @keyframes scrollText {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .announcement-wrapper:hover .announcement-track {
      animation-play-state: paused;
    }

    /* --- CATEGORY & PRODUCT GRID --- */
    .category-section { margin-bottom: 2.5rem; }
    .category-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      margin-bottom: 1rem; 
      border-bottom: 2px solid #e8edf2; 
      padding-bottom: 0.6rem; 
    }
    .category-title { 
      font-size: 1.4rem; 
      font-weight: 700; 
      color: #1a3428; 
    }
    .category-count { 
      font-size: 0.75rem; 
      color: #4b6b5e; 
      font-weight: 400; 
      margin-left: 0.5rem; 
    }
    .category-more-btn { 
      background: none; 
      border: none; 
      color: #1f8b4c; 
      font-weight: 600; 
      font-size: 0.85rem; 
      cursor: pointer; 
      transition: 0.2s; 
      display: flex; 
      align-items: center; 
      gap: 0.3rem; 
      padding: 0.2rem 0.6rem; 
      border-radius: 20px; 
    }
    .category-more-btn:hover { background: #f0f8f2; }
    .category-more-btn .arrow { transition: 0.3s; display: inline-block; }
    .category-more-btn.active .arrow { transform: rotate(180deg); }
    
    .products-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
      gap: 1rem; 
      transition: all 0.3s ease; 
    }
    .products-grid.hidden-items .product-card.hidden-item { display: none; }
    
    .product-card { 
      background: white; 
      border-radius: 16px; 
      overflow: hidden; 
      border: 1px solid #eef2f6; 
      transition: 0.2s ease; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
      position: relative; 
      cursor: pointer;
    }
    .product-card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
    }
    .product-card.hidden-item { display: block; }
    
    .product-image-frame { 
      position: relative; 
      width: 100%; 
      padding-bottom: 100%; 
      background: #f3f8f5; 
      overflow: hidden; 
    }
    .product-image-frame img { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      transition: 0.3s; 
    }
    .product-card:hover .product-image-frame img { transform: scale(1.05); }
    .product-image-placeholder { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 3rem; 
      color: #2d7a4b; 
    }
    
    .product-info { padding: 0.7rem 0.8rem 0.9rem; }
    .product-title { 
      font-size: 0.85rem; 
      font-weight: 600; 
      color: #1e2e2a; 
      display: -webkit-box; 
      -webkit-line-clamp: 1; 
      -webkit-box-orient: vertical; 
      overflow: hidden; 
    }
    .product-description { 
      color: #5f6f6a; 
      font-size: 0.7rem; 
      display: -webkit-box; 
      -webkit-line-clamp: 1; 
      -webkit-box-orient: vertical; 
      overflow: hidden; 
      margin: 0.1rem 0 0.3rem; 
    }
    .product-footer { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding-top: 0.4rem; 
      border-top: 1px solid #edf2ef; 
    }
    .product-price { 
      font-weight: 700; 
      font-size: 1rem; 
      color: #0f6e3a; 
    }
    .product-price::before { content: '৳'; }
    .add-to-cart-btn { 
      background: #1f8b4c; 
      color: white; 
      border: none; 
      padding: 0.3rem 1rem; 
      border-radius: 30px; 
      font-weight: 600; 
      font-size: 0.7rem; 
      cursor: pointer; 
      transition: 0.2s; 
    }
    .add-to-cart-btn:hover { 
      background: #0f6e3a; 
      transform: scale(1.05); 
    }
    .add-to-cart-btn:active { transform: scale(0.95); }

    /* --- POPUPS & TOASTS --- */
    .simple-popup { 
      position: fixed; 
      bottom: 100px; 
      left: 50%; 
      transform: translateX(-50%) translateY(20px); 
      background: rgba(0,0,0,0.85); 
      color: white; 
      padding: 0.8rem 1.8rem; 
      border-radius: 40px; 
      font-size: 0.9rem; 
      font-weight: 500; 
      backdrop-filter: blur(4px); 
      -webkit-backdrop-filter: blur(4px); 
      box-shadow: 0 8px 32px rgba(0,0,0,0.25); 
      opacity: 0; 
      pointer-events: none; 
      transition: all 0.3s ease; 
      z-index: 9999; 
      max-width: 90%; 
      text-align: center; 
      white-space: nowrap; 
    }
    .simple-popup.active { 
      opacity: 1; 
      transform: translateX(-50%) translateY(0); 
      pointer-events: auto; 
    }
    .simple-popup .icon { display: inline-block; margin-right: 0.5rem; font-size: 1rem; }
    
    .toast-container { 
      position: fixed; 
      top: 80px; 
      right: 16px; 
      z-index: 9998; 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      max-width: 360px; 
      width: 100%; 
      pointer-events: none; 
    }
    .toast { 
      background: #ffffff; 
      border-radius: 14px; 
      padding: 12px 16px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.12); 
      border: 1px solid #e8edf2; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      animation: slideInRight 0.4s cubic-bezier(0.34,1.56,0.64,1); 
      pointer-events: auto; 
    }
    .toast.removing { animation: slideOutRight 0.3s ease forwards; }
    .toast-icon { 
      width: 36px; 
      height: 36px; 
      border-radius: 50%; 
      background: #fef3f0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 1.1rem; 
      flex-shrink: 0; 
    }
    .toast-content { flex: 1; min-width: 0; }
    .toast-title { font-size: 0.85rem; font-weight: 600; color: #1a2a3a; }
    .toast-message { font-size: 0.75rem; color: #4b6b5e; }
    .toast-close { 
      background: none; 
      border: none; 
      color: #9ca3af; 
      cursor: pointer; 
      font-size: 1rem; 
      padding: 4px; 
      transition: 0.2s; 
    }
    .toast-close:hover { color: #1a2a3a; }

    @keyframes slideInRight { 
      from { opacity: 0; transform: translateX(80px) scale(0.9); } 
      to { opacity: 1; transform: translateX(0) scale(1); } 
    }
    @keyframes slideOutRight { 
      from { opacity: 1; transform: translateX(0) scale(1); } 
      to { opacity: 0; transform: translateX(80px) scale(0.9); } 
    }

    /* --- QUICK VIEW MODAL --- */
    .quickview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.25s ease;
    }
    .quickview-overlay.active {
      display: flex;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .quickview-modal {
      background: #ffffff;
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      position: relative;
    }
    .quickview-close {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      background: #f3f6f8;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      color: #1a2a3a;
    }
    .quickview-close:hover {
      background: #e8edf2;
    }
    .quickview-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      background: #f3f8f5;
      border-radius: 12px;
      margin-bottom: 1rem;
      border: 1px solid #eef2f6;
    }
    .quickview-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a3428;
      margin-bottom: 0.2rem;
    }
    .quickview-description {
      font-size: 0.85rem;
      color: #4b6b5e;
      margin-bottom: 0.8rem;
      line-height: 1.6;
    }
    .quickview-price {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0f6e3a;
      margin-bottom: 0.8rem;
    }
    .quickview-price::before {
      content: '৳';
    }
    .quickview-controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.4rem;
    }
    .quickview-qty-wrapper {
      display: flex;
      align-items: center;
      background: #f5f8f7;
      border-radius: 40px;
      padding: 0.2rem;
      gap: 0.2rem;
    }
    .quickview-qty-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: white;
      color: #1a2a3a;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .quickview-qty-btn:hover {
      background: #1f8b4c;
      color: white;
    }
    .quickview-qty-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .quickview-qty-display {
      font-size: 1rem;
      font-weight: 600;
      min-width: 32px;
      text-align: center;
      color: #1e2e2a;
    }
    .quickview-add-btn {
      background: #1f8b4c;
      color: white;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      flex: 1;
      box-shadow: 0 2px 10px rgba(31,139,76,0.15);
    }
    .quickview-add-btn:hover {
      background: #0f6e3a;
      transform: scale(1.02);
    }
    .quickview-add-btn:active {
      transform: scale(0.96);
    }

    /* --- MOBILE NAV --- */
    .mobile-bottom-nav { display: none; }

    /* --- RESPONSIVE (Mobile) --- */
    @media (max-width: 768px) {
      body { padding-bottom: 70px; }
      .nav-links { display: none; }
      .navbar { padding: 0.6rem 1rem; }
      .logo-text { font-size: 1.1rem; }
      .logo-image { width: 58px; height: 58px; }
      .announcement-track span { font-size: 0.7rem; padding: 0 1.5rem; }
      
      .mobile-bottom-nav { 
        display: flex; 
        position: fixed; 
        bottom: 0; 
        left: 0; 
        width: 100%; 
        background: rgba(255,255,255,0.96); 
        backdrop-filter: blur(12px); 
        -webkit-backdrop-filter: blur(12px); 
        border-top: 1px solid #e4eaf0; 
        box-shadow: 0 -4px 16px rgba(0,0,0,0.04); 
        justify-content: space-around; 
        align-items: center; 
        padding: 0.5rem 0 0.7rem; 
        z-index: 200; 
      }
      .mobile-bottom-nav a { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-decoration: none; 
        color: #4b5f6b; 
        font-size: 0.55rem; 
        font-weight: 500; 
        gap: 0.15rem; 
        padding: 0.2rem 0.6rem; 
        transition: 0.2s; 
        flex: 1; 
        max-width: 100px; 
        border-radius: 8px; 
      }
      .mobile-bottom-nav a:hover { 
        color: #1f8b4c; 
        background: #f0f8f2; 
      }
      .mobile-bottom-nav a .nav-icon { 
        width: 24px; 
        height: 24px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        margin-bottom: 0.1rem; 
      }
      .mobile-bottom-nav a .nav-icon svg { 
        width: 20px; 
        height: 20px; 
        fill: currentColor; 
      }
      .mobile-bottom-nav a .nav-label { 
        font-size: 0.6rem; 
        font-weight: 600; 
        letter-spacing: 0.2px; 
        text-transform: uppercase; 
      }
      .mobile-bottom-nav .nav-home { 
        background: #f0f8f2; 
        border-radius: 12px; 
        padding: 0.25rem 0.6rem; 
        margin: 0 0.1rem; 
        flex: 1.2; 
        max-width: 120px; 
      }
      .mobile-bottom-nav .cart-badge { 
        background: #1f8b4c; 
        color: white; 
        border-radius: 40px; 
        padding: 0.02rem 0.5rem; 
        font-size: 0.45rem; 
        font-weight: 600; 
        margin-left: 0.15rem; 
        display: inline-block; 
      }
      
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 0.8rem; }
      .container { padding: 1rem; }
      .category-title { font-size: 1.1rem; }
      .simple-popup { bottom: 80px; padding: 0.6rem 1.4rem; font-size: 0.8rem; }
      .toast-container { top: 70px; right: 12px; max-width: 320px; }
      .toast { padding: 10px 14px; }
      .toast-title { font-size: 0.8rem; }
      .quickview-modal { padding: 1rem; border-radius: 16px; }
      .quickview-title { font-size: 1rem; }
      .quickview-price { font-size: 1.1rem; }
      .quickview-qty-btn { width: 30px; height: 30px; font-size: 0.9rem; }
    }

    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
      .product-title { font-size: 0.75rem; }
      .product-price { font-size: 0.85rem; }
      .add-to-cart-btn { font-size: 0.65rem; padding: 0.25rem 0.8rem; }
      .toast-container { top: 60px; right: 8px; max-width: 280px; }
      .mobile-bottom-nav a .nav-label { font-size: 0.55rem; }
      .mobile-bottom-nav .nav-home { max-width: 100px; }
      .simple-popup { bottom: 70px; padding: 0.5rem 1.2rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <img src="/assets/logo.png" alt="Batisha Online" class="logo-image">
        <span class="logo-text">Batisha <span>online</span></span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/product/">Products</a>
        <a href="/cart/" class="cart-pill">Cart <span id="cartCount">0</span></a>
      </div>
    </div>
  </nav>

  <!-- ===== ANNOUNCEMENT TICKER ===== -->
  <div class="announcement-wrapper" id="announcementWrapper">
    <div class="announcement-track" id="announcementTrack">
      <!-- Content will be injected by JS -->
    </div>
  </div>

  <div class="mobile-bottom-nav">
    <a href="/product/">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4 8 4 8-4zm0 0v10l-8 4-8-4V7l8 4 8-4z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="nav-label">Products</span>
    </a>
    <a href="/" class="nav-home">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="nav-label">Home</span>
    </a>
    <a href="/cart/">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="20" cy="21" r="1" stroke="currentColor" stroke-width="2" fill="none"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="nav-label">Cart <span class="cart-badge" id="mobileCartCount">0</span></span>
    </a>
  </div>

  <main class="container" id="mainContainer">
    <div id="loadingState" style="text-align:center;padding:2rem;">
      <div style="width:32px;height:32px;border:3px solid #e2ebe6;border-top-color:#1f8b4c;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;"></div>
      <p style="color:#4b6b5e;font-size:0.85rem;margin-top:0.5rem;">Loading products…</p>
    </div>
    <div id="errorState" style="display:none;text-align:center;padding:2rem;color:#991b1b;">
      <p>Failed to load products. <button onclick="location.reload()" style="background:#1f8b4c;color:white;border:none;padding:0.2rem 0.8rem;border-radius:40px;font-weight:600;cursor:pointer;">Retry</button></p>
    </div>
    <div id="categoryContainer"></div>

    <!-- Quick View Modal -->
    <div class="quickview-overlay" id="quickViewOverlay">
      <div class="quickview-modal">
        <button class="quickview-close" id="quickViewClose">✕</button>
        <img class="quickview-image" id="quickViewImage" src="" alt="Product Image">
        <h2 class="quickview-title" id="quickViewTitle">Product Title</h2>
        <p class="quickview-description" id="quickViewDescription">Product description goes here.</p>
        <div class="quickview-price" id="quickViewPrice">0.00</div>
        <div class="quickview-controls">
          <div class="quickview-qty-wrapper">
            <button class="quickview-qty-btn" id="quickViewDecrease" disabled>−</button>
            <span class="quickview-qty-display" id="quickViewQty">1</span>
            <button class="quickview-qty-btn" id="quickViewIncrease">+</button>
          </div>
          <button class="quickview-add-btn" id="quickViewAddBtn">Add to Cart</button>
        </div>
      </div>
    </div>
  </main>

  <div id="simplePopup" class="simple-popup">
    <span class="icon">✓</span> Added to cart
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      'use strict';
      const TABLE_NAME = 'product';
      const ANNOUNCE_TABLE = 'announcements';
      let supabaseUrl = null, supabaseAnonKey = null, allProducts = [], popupTimeout = null;
      
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const categoryContainer = document.getElementById('categoryContainer');
      const cartCountSpan = document.getElementById('cartCount');
      const mobileCartCountSpan = document.getElementById('mobileCartCount');
      const toastContainer = document.getElementById('toastContainer');
      const simplePopup = document.getElementById('simplePopup');
      
      const announcementWrapper = document.getElementById('announcementWrapper');
      const announcementTrack = document.getElementById('announcementTrack');

      async function fetchConfig() {
        try {
          const resp = await fetch('/api/config');
          if (!resp.ok) throw new Error('Config failed');
          const cfg = await resp.json();
          supabaseUrl = cfg.supabaseUrl; 
          supabaseAnonKey = cfg.supabaseAnonKey;
          return true;
        } catch (e) {
          console.warn('⚠️ Config fetch failed:', e);
          return false;
        }
      }

      async function fetchAnnouncement() {
        console.log("📢 Fetching announcement...");
        try {
          if (!supabaseUrl || !supabaseAnonKey) {
            console.log("📢 Config not ready, cannot fetch announcement.");
            return;
          }

          const response = await fetch(`${supabaseUrl}/rest/v1/${ANNOUNCE_TABLE}?select=*&limit=1`, {
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}` }
          });
          if (!response.ok) throw new Error('Failed to fetch announcement');
          const data = await response.json();
          console.log("📢 Data received:", data);
          
          if (data && data.length > 0) {
            const row = data[0];
            console.log("📢 Row found:", row);
            
            if (row.is_active === true && row.text && row.text.trim() !== '') {
              console.log("📢 Ticker is ACTIVE. Showing text:", row.text);
              announcementWrapper.style.display = 'block';
              const text = escapeHtml(row.text);
              announcementTrack.innerHTML = `<span>${text}</span><span>${text}</span><span>${text}</span><span>${text}</span>`;
            } else {
              console.log("📢 Ticker is INACTIVE or text empty. Hiding.");
              announcementWrapper.style.display = 'none';
            }
          } else {
            console.log("📢 No announcement row found.");
            announcementWrapper.style.display = 'none';
          }
        } catch (error) {
          console.error("📢 Error fetching announcement:", error);
          announcementWrapper.style.display = 'none';
        }
      }

      async function fetchProducts() {
        try {
          loadingState.style.display = 'block'; 
          errorState.style.display = 'none'; 
          categoryContainer.style.display = 'none';
          
          if (!supabaseUrl || !supabaseAnonKey) {
            throw new Error('Supabase config missing');
          }
          
          const url = `${supabaseUrl}/rest/v1/${TABLE_NAME}?select=*&order=id.desc`;
          const response = await fetch(url, { 
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}` } 
          });
          if (!response.ok) throw new Error('Fetch failed');
          allProducts = await response.json();
          
          loadingState.style.display = 'none';
          if (!allProducts || allProducts.length === 0) {
            categoryContainer.innerHTML = '<div style="text-align:center;padding:2rem;color:#4b6b5e;">No products available yet</div>';
            categoryContainer.style.display = 'block'; 
            return;
          }
          renderCategories(allProducts); 
          categoryContainer.style.display = 'block';
          
          // Attach quick view listeners after rendering
          setTimeout(attachQuickViewListeners, 100);
        } catch (e) { 
          console.error('Product fetch error:', e);
          loadingState.style.display = 'none'; 
          errorState.style.display = 'block'; 
        }
      }

      function renderCategories(products) {
        categoryContainer.innerHTML = '';
        const categoryMap = {};
        const categoryOrder = ['electronics', 'grocery', 'medicine', 'vegetables', 'fruits', 'bakery', 'others'];
        const categoryLabels = { 
          'electronics':'Electronics','grocery':'Grocery','medicine':'Medicine',
          'vegetables':'Vegetables','fruits':'Fruits','bakery':'Bakery','others':'Others' 
        };
        
        products.forEach(p => { 
          const cat = p.category || 'others'; 
          if (!categoryMap[cat]) categoryMap[cat] = []; 
          categoryMap[cat].push(p); 
        });
        
        categoryOrder.forEach(cat => {
          if (!categoryMap[cat] || categoryMap[cat].length === 0) return;
          const items = categoryMap[cat];
          const section = document.createElement('div'); 
          section.className = 'category-section'; 
          section.id = `category-${cat}`;
          const header = document.createElement('div'); 
          header.className = 'category-header';
          header.innerHTML = `<h2 class="category-title">${categoryLabels[cat] || cat} <span class="category-count">${items.length} items</span></h2>${items.length > 4 ? `<button class="category-more-btn" onclick="window.toggleCategory('${cat}')">View All <span class="arrow">▼</span></button>` : ''}`;
          section.appendChild(header);
          const grid = document.createElement('div'); 
          grid.className = 'products-grid hidden-items'; 
          grid.id = `grid-${cat}`;
          items.forEach((p, index) => {
            const card = document.createElement('div'); 
            card.className = 'product-card';
            card.setAttribute('data-id', p.id);
            if (index >= 4) card.classList.add('hidden-item');
            const imgHtml = p.image_url ? `<div class="product-image-frame"><img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.title)}" onerror="this.parentElement.innerHTML='<div class=\\'product-image-placeholder\\'>🥬</div>'"></div>` : `<div class="product-image-frame"><div class="product-image-placeholder">🥬</div></div>`;
            card.innerHTML = `${imgHtml}<div class="product-info"><h3 class="product-title">${escapeHtml(p.title || 'No title')}</h3><p class="product-description">${escapeHtml(p.description || '')}</p><div class="product-footer"><span class="product-price">${parseFloat(p.price || 0).toFixed(2)}</span><button class="add-to-cart-btn" onclick="window.addToCart(${p.id}, '${escapeHtml(p.title || 'Product')}', ${p.price || 0}, '${escapeHtml(p.image_url || '')}')">Add</button></div></div>`;
            grid.appendChild(card);
          });
          section.appendChild(grid); 
          categoryContainer.appendChild(section);
        });
      }

      window.toggleCategory = function(category) {
        const grid = document.getElementById(`grid-${category}`); 
        const btn = document.querySelector(`#category-${category} .category-more-btn`);
        if (!grid) return;
        grid.classList.toggle('hidden-items');
        if (btn) { 
          btn.classList.toggle('active'); 
          btn.innerHTML = grid.classList.contains('hidden-items') ? 'View All <span class="arrow">▼</span>' : 'Show Less <span class="arrow">▲</span>'; 
        }
        // Re-attach listeners after toggle
        setTimeout(attachQuickViewListeners, 200);
      };

      function escapeHtml(str) { 
        const d = document.createElement('div'); 
        d.textContent = str || ''; 
        return d.innerHTML; 
      }

      function showSimplePopup() {
        if (popupTimeout) { clearTimeout(popupTimeout); popupTimeout = null; }
        simplePopup.classList.add('active');
        popupTimeout = setTimeout(() => { simplePopup.classList.remove('active'); popupTimeout = null; }, 1200);
      }

      window.addToCart = function(id, title, price, imageUrl) {
        let cart = JSON.parse(localStorage.getItem('grocery_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) { existing.quantity += 1; } else { cart.push({ id, title, price, imageUrl, quantity: 1 }); }
        localStorage.setItem('grocery_cart', JSON.stringify(cart)); 
        updateCartCount(); 
        showSimplePopup();
      };

      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('grocery_cart') || '[]');
        const total = cart.reduce((sum, i) => sum + i.quantity, 0);
        if (cartCountSpan) cartCountSpan.textContent = total;
        if (mobileCartCountSpan) mobileCartCountSpan.textContent = total;
      }

      // ===== QUICK VIEW MODAL LOGIC =====
      const quickViewOverlay = document.getElementById('quickViewOverlay');
      const quickViewClose = document.getElementById('quickViewClose');
      const quickViewImage = document.getElementById('quickViewImage');
      const quickViewTitle = document.getElementById('quickViewTitle');
      const quickViewDescription = document.getElementById('quickViewDescription');
      const quickViewPrice = document.getElementById('quickViewPrice');
      const quickViewQty = document.getElementById('quickViewQty');
      const quickViewDecrease = document.getElementById('quickViewDecrease');
      const quickViewIncrease = document.getElementById('quickViewIncrease');
      const quickViewAddBtn = document.getElementById('quickViewAddBtn');

      let quickViewCurrentProduct = null;
      let quickViewCurrentQty = 1;

      function openQuickView(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;

        quickViewCurrentProduct = product;
        quickViewCurrentQty = 1;
        quickViewQty.textContent = '1';
        quickViewDecrease.disabled = true;

        quickViewImage.src = product.image_url || '';
        quickViewImage.alt = product.title || 'Product';
        if (!product.image_url) {
          quickViewImage.src = '';
          quickViewImage.alt = 'No image';
          quickViewImage.style.background = '#f3f8f5';
        } else {
          quickViewImage.style.background = '#f3f8f5';
        }
        quickViewTitle.textContent = product.title || 'No title';
        quickViewDescription.textContent = product.description || '';
        quickViewPrice.textContent = parseFloat(product.price || 0).toFixed(2);

        quickViewOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeQuickView() {
        quickViewOverlay.classList.remove('active');
        document.body.style.overflow = '';
        quickViewCurrentProduct = null;
      }

      function updateQuickViewQty(newQty) {
        if (newQty < 1) return;
        quickViewCurrentQty = newQty;
        quickViewQty.textContent = newQty;
        quickViewDecrease.disabled = (newQty <= 1);
      }

      quickViewIncrease.addEventListener('click', () => updateQuickViewQty(quickViewCurrentQty + 1));
      quickViewDecrease.addEventListener('click', () => updateQuickViewQty(quickViewCurrentQty - 1));

      quickViewAddBtn.addEventListener('click', function() {
        if (!quickViewCurrentProduct) return;
        if (typeof window.addToCart === 'function') {
          for (let i = 0; i < quickViewCurrentQty; i++) {
            window.addToCart(
              quickViewCurrentProduct.id,
              quickViewCurrentProduct.title || 'Product',
              quickViewCurrentProduct.price || 0,
              quickViewCurrentProduct.image_url || ''
            );
          }
          // Update popup message to show quantity
          const popup = document.getElementById('simplePopup');
          if (popup) {
            popup.innerHTML = `<span class="icon">✓</span> Added ${quickViewCurrentQty} × ${quickViewCurrentProduct.title} to cart`;
            setTimeout(() => {
              popup.innerHTML = `<span class="icon">✓</span> Added to cart`;
            }, 1500);
          }
        }
        closeQuickView();
      });

      quickViewClose.addEventListener('click', closeQuickView);
      quickViewOverlay.addEventListener('click', function(e) {
        if (e.target === quickViewOverlay) closeQuickView();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeQuickView();
      });

      function attachQuickViewListeners() {
        const productCards = document.querySelectorAll('.product-card');
        productCards.forEach(card => {
          card.removeEventListener('click', quickViewCardClick);
          card.addEventListener('click', quickViewCardClick);
        });
      }

      function quickViewCardClick(e) {
        if (e.target.closest('.add-to-cart-btn')) return;

        const card = e.currentTarget;
        const addBtnEl = card.querySelector('.add-to-cart-btn');
        if (addBtnEl) {
          const onclickStr = addBtnEl.getAttribute('onclick');
          const match = onclickStr.match(/addToCart\((\d+)/);
          if (match && match[1]) {
            const productId = parseInt(match[1]);
            openQuickView(productId);
            return;
          }
        }

        const dataId = card.getAttribute('data-id');
        if (dataId) {
          openQuickView(parseInt(dataId));
        }
      }

      // ===== END QUICK VIEW =====

      async function init() { 
        updateCartCount(); 
        const ok = await fetchConfig(); 
        await fetchAnnouncement(); 
        await fetchProducts(); 
      }

      window.addEventListener('DOMContentLoaded', init); 
      window.addEventListener('storage', updateCartCount);
      
      const style = document.createElement('style'); 
      style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`; 
      document.head.appendChild(style);
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          registration.update();
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                window.location.reload();
              }
            });
          });
        })
        .catch(err => console.log('❌ SW registration failed:', err));
    }
  </script>
</body>
</html>
