<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Cart · Batisha online</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8faf8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a2a3a;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* ----- NAVBAR ----- */
    .navbar {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #e8edf2;
      padding: 0.8rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      color: #1a2a3a;
    }
    .logo-image {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 8px;
    }
    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-text span {
      font-weight: 400;
      color: #4b6b5e;
      font-size: 0.75rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2f3e4e;
      transition: 0.2s;
    }
    .nav-links a:hover {
      color: #1f8b4c;
    }
    .nav-links a.active {
      color: #1f8b4c;
    }

    .cart-pill {
      background: #f0f5fc;
      padding: 0.3rem 1rem 0.3rem 0.8rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid #dde5ed;
      transition: 0.2s;
      color: #1a2a3a;
    }
    .cart-pill:hover {
      background: #e4edf7;
      border-color: #b8cee0;
    }
    .cart-pill span {
      background: #1f8b4c;
      color: white;
      border-radius: 40px;
      padding: 0.02rem 0.6rem;
      font-size: 0.65rem;
      font-weight: 600;
    }

    /* ----- MAIN ----- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1.2rem 1.2rem 2rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }
    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3428;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .item-count {
      background: #eaf1ec;
      color: #1a3428;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
    }

    /* ----- CART ITEMS ----- */
    .cart-item {
      background: white;
      border-radius: 16px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      border: 1px solid #eef2f6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: 0.3s ease;
    }
    .cart-item.removing {
      opacity: 0;
      transform: translateX(40px);
    }

    .cart-item-image {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: contain;
      background: #f3f8f5;
      flex-shrink: 0;
      border: 1px solid #e4ece8;
    }
    .cart-item-placeholder {
      width: 72px;
      height: 72px;
      background: #eaf1ec;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #2d7a4b;
      flex-shrink: 0;
      border: 1px solid #e4ece8;
    }

    .cart-item-details {
      flex: 1;
      min-width: 0;
    }
    .cart-item-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e2e2a;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cart-item-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #0f6e3a;
      margin-top: 0.1rem;
    }
    .cart-item-price::before {
      content: '৳';
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
      background: #f5f8f7;
      border-radius: 40px;
      padding: 0.2rem 0.2rem;
      display: inline-flex;
    }
    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: white;
      color: #1a2a3a;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .qty-btn:hover {
      background: #1f8b4c;
      color: white;
    }
    .qty-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .qty-display {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 24px;
      text-align: center;
      color: #1e2e2a;
    }

    .cart-item-total {
      font-weight: 700;
      color: #0f6e3a;
      font-size: 0.85rem;
      margin-left: 0.3rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.3rem;
      border-radius: 50%;
      transition: 0.15s;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .delete-btn:hover {
      opacity: 1;
      color: #dc2626;
      background: rgba(220, 38, 38, 0.06);
    }

    /* ----- CART SUMMARY ----- */
    .cart-summary {
      background: white;
      border-radius: 16px;
      padding: 1.2rem 1.2rem 1.4rem;
      margin-top: 0.8rem;
      border: 1px solid #eef2f6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      font-size: 0.9rem;
      color: #2f3e4e;
    }
    .summary-row.delivery {
      color: #1f8b4c;
      font-weight: 500;
    }
    .summary-row.total {
      border-top: 2px solid #f0f5f2;
      margin-top: 0.6rem;
      padding-top: 0.8rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3428;
    }
    .checkout-btn {
      width: 100%;
      background: #1f8b4c;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: 0 2px 10px rgba(31, 139, 76, 0.15);
    }
    .checkout-btn:hover {
      background: #0f6e3a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(31, 139, 76, 0.25);
    }
    .checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ----- EMPTY STATE ----- */
    .empty-cart {
      text-align: center;
      padding: 3rem 1rem;
    }
    .empty-cart .emoji {
      font-size: 4rem;
      margin-bottom: 0.5rem;
    }
    .empty-cart h2 {
      font-size: 1.1rem;
      color: #1a3428;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .empty-cart p {
      color: #4b6b5e;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }
    .continue-btn {
      background: #1f8b4c;
      color: white;
      padding: 0.6rem 2rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.12);
    }
    .continue-btn:hover {
      background: #0f6e3a;
      transform: scale(1.02);
    }

    /* ----- CHECKOUT MODAL ----- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.25s ease;
      padding: 1rem;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 1.8rem 1.6rem;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
      border: 1px solid #f0f5f2;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }
    .modal-header .icon {
      font-size: 1.6rem;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3428;
    }

    .order-summary-mini {
      background: #f8fbf9;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.8rem;
      color: #1e2e2a;
      border: 1px solid #eaf1ec;
    }
    .order-summary-mini .row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
    }
    .order-summary-mini .row.total {
      border-top: 1px solid #dce8e2;
      margin-top: 0.4rem;
      padding-top: 0.5rem;
      font-weight: 700;
      color: #0f6e3a;
      font-size: 0.9rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      margin-bottom: 0.9rem;
    }
    .form-group label {
      color: #1a3428;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-input {
      background: #f8fbf9;
      border: 1px solid #e4ece8;
      color: #1e2b3a;
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: 0.15s;
    }
    .form-input:focus {
      border-color: #1f8b4c;
      box-shadow: 0 0 0 3px rgba(31, 139, 76, 0.08);
    }
    textarea.form-input {
      resize: vertical;
      min-height: 60px;
    }

    .modal-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.2rem;
    }
    .btn {
      padding: 0.6rem 1.4rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: 0.15s;
      flex: 1;
      text-align: center;
    }
    .btn-cancel {
      background: #f3f6f8;
      color: #1a2a3a;
      border: 1px solid #e4eaf0;
    }
    .btn-cancel:hover {
      background: #e8edf2;
    }
    .btn-place {
      background: #1f8b4c;
      color: white;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.15);
    }
    .btn-place:hover {
      background: #0f6e3a;
    }
    .btn-place:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ----- SUCCESS MODAL ----- */
    .success-modal .modal-box {
      text-align: center;
      padding: 2rem 1.6rem;
    }
    .success-icon {
      font-size: 3.2rem;
      margin-bottom: 0.2rem;
    }
    .success-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a3428;
      margin-bottom: 0.2rem;
    }
    .success-sub {
      font-size: 0.85rem;
      color: #4b6b5e;
      margin-bottom: 0.3rem;
    }
    .order-id-badge {
      background: #eaf1ec;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #0f6e3a;
      display: inline-block;
      margin: 0.4rem 0 0.6rem;
    }
    .delivery-time-box {
      background: #f0f9f2;
      border-radius: 12px;
      padding: 0.8rem;
      margin: 0.8rem 0 1rem;
      border: 1px solid #d4e8dc;
    }
    .delivery-time-box .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #1f8b4c;
      font-weight: 600;
    }
    .delivery-time-box .time {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3428;
      margin-top: 0.1rem;
    }
    .back-btn {
      width: 100%;
      background: #1f8b4c;
      color: white;
      border: none;
      padding: 0.7rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: 0.15s;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.12);
    }
    .back-btn:hover {
      background: #0f6e3a;
      transform: translateY(-1px);
    }

    /* ----- TOAST ----- */
    .toast-container {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 360px;
      width: 100%;
      pointer-events: none;
    }

    .toast {
      background: #ffffff;
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      border: 1px solid #e8edf2;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
    }

    .toast.removing {
      animation: slideOutRight 0.3s ease forwards;
    }

    .toast-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fef3f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .toast-content {
      flex: 1;
      min-width: 0;
    }
    .toast-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a2a3a;
    }
    .toast-message {
      font-size: 0.75rem;
      color: #4b6b5e;
    }

    .toast-close {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      transition: 0.2s;
    }
    .toast-close:hover {
      color: #1a2a3a;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(80px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes slideOutRight {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateX(80px) scale(0.9);
      }
    }

    /* ----- MOBILE NAV (Professional SVG Icons) ----- */
    .mobile-bottom-nav {
      display: none;
    }

    @media (max-width: 768px) {
      body {
        padding-bottom: 70px;
      }
      .nav-links {
        display: none;
      }
      .navbar {
        padding: 0.6rem 1rem;
      }
      .logo-text {
        font-size: 1.1rem;
      }
      .logo-image {
        width: 58px;
        height: 58px;
      }

      .mobile-bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid #e4eaf0;
        box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.04);
        justify-content: space-around;
        align-items: center;
        padding: 0.5rem 0 0.7rem;
        z-index: 200;
      }
      .mobile-bottom-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: #4b5f6b;
        font-size: 0.55rem;
        font-weight: 500;
        gap: 0.15rem;
        padding: 0.2rem 0.6rem;
        transition: 0.2s;
        flex: 1;
        max-width: 100px;
        border-radius: 8px;
      }
      .mobile-bottom-nav a:hover {
        color: #1f8b4c;
        background: #f0f8f2;
      }
      .mobile-bottom-nav a .nav-icon {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.1rem;
      }
      .mobile-bottom-nav a .nav-icon svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }
      .mobile-bottom-nav a .nav-label {
        font-size: 0.6rem;
        font-weight: 600;
        letter-spacing: 0.2px;
        text-transform: uppercase;
      }
      .mobile-bottom-nav .nav-home {
        background: #f0f8f2;
        border-radius: 12px;
        padding: 0.25rem 0.6rem;
        margin: 0 0.1rem;
        flex: 1.2;
        max-width: 120px;
      }
      .mobile-bottom-nav .cart-badge {
        background: #1f8b4c;
        color: white;
        border-radius: 40px;
        padding: 0.02rem 0.5rem;
        font-size: 0.45rem;
        font-weight: 600;
        margin-left: 0.15rem;
        display: inline-block;
      }

      .cart-item {
        padding: 0.8rem;
        gap: 0.7rem;
      }
      .cart-item-image,
      .cart-item-placeholder {
        width: 64px;
        height: 64px;
      }
      .container {
        padding: 0.8rem 0.8rem 1.5rem;
      }
      .page-title {
        font-size: 1.2rem;
      }
      .modal-box {
        padding: 1.5rem 1.2rem;
      }
      .toast-container {
        top: 70px;
        right: 12px;
        max-width: 320px;
      }
      .toast {
        padding: 10px 14px;
      }
      .toast-title {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 480px) {
      .cart-item {
        padding: 0.7rem;
      }
      .cart-item-image,
      .cart-item-placeholder {
        width: 56px;
        height: 56px;
      }
      .cart-item-title {
        font-size: 0.8rem;
      }
      .qty-btn {
        width: 26px;
        height: 26px;
        font-size: 0.8rem;
      }
      .toast-container {
        top: 60px;
        right: 8px;
        max-width: 280px;
      }
      .mobile-bottom-nav a .nav-label {
        font-size: 0.55rem;
      }
      .mobile-bottom-nav .nav-home {
        max-width: 100px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <img src="/assets/logo.png" alt="Batisha Online" class="logo-image">
        <span class="logo-text">Batisha <span>online</span></span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/product/">Products</a>
        <a href="/cart/" class="cart-pill active">Cart <span id="cartCount">0</span></a>
      </div>
    </div>
  </nav>

  <div class="mobile-bottom-nav">
    <a href="/product/">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4 8 4 8-4zm0 0v10l-8 4-8-4V7l8 4 8-4z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="nav-label">Products</span>
    </a>
    <a href="/" class="nav-home">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="nav-label">Home</span>
    </a>
    <a href="/cart/" class="nav-home">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="20" cy="21" r="1" stroke="currentColor" stroke-width="2" fill="none"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="nav-label">Cart <span class="cart-badge" id="mobileCartCount">0</span></span>
    </a>
  </div>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Your Cart <span class="item-count" id="itemCountBadge">0</span></h1>
    </div>

    <div id="cartItems"></div>

    <div id="emptyCart" class="empty-cart" style="display: none;">
      <div class="emoji">🛒</div>
      <h2>Your cart is empty</h2>
      <p>Looks like you haven't added anything yet!</p>
      <a href="/" class="continue-btn">Continue Shopping</a>
    </div>

    <div id="cartSummary" class="cart-summary" style="display: none;">
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">৳0.00</span></div>
      <div class="summary-row delivery"><span>Delivery Fee</span><span id="deliveryFee">৳30.00</span></div>
      <div class="summary-row total"><span>Total</span><span id="totalAmount">৳0.00</span></div>
      <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
    </div>
  </main>

  <!-- CHECKOUT MODAL -->
  <div id="checkoutModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-header">
        <span class="icon">📦</span>
        <span class="modal-title">Complete your order</span>
      </div>
      <div class="order-summary-mini" id="orderSummaryMini"></div>
      <form id="checkoutForm">
        <div class="form-group"><label>Full Name *</label><input type="text" id="custName" class="form-input" placeholder="Enter your full name" required></div>
        <div class="form-group"><label>Phone Number *</label><input type="tel" id="custPhone" class="form-input" placeholder="01XXXXXXXXX" required></div>
        <div class="form-group"><label>Delivery Address *</label><textarea id="custAddress" class="form-input" placeholder="House, Road, Area, City" required></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="cancelCheckoutBtn">Cancel</button>
          <button type="submit" class="btn btn-place" id="placeOrderBtn">Place Order</button>
        </div>
      </form>
    </div>
  </div>

  <!-- SUCCESS MODAL -->
  <div id="successModal" class="modal-overlay success-modal" style="display: none;">
    <div class="modal-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Order Confirmed!</div>
      <div class="success-sub">Thank you for your order</div>
      <div class="order-id-badge" id="successOrderId">#0</div>
      <div class="delivery-time-box">
        <div class="label">Estimated delivery</div>
        <div class="time" id="deliveryTimeDisplay">—</div>
      </div>
      <button class="back-btn" id="backToHomeBtn">Back to Home</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      'use strict';

      const CART_KEY = 'grocery_cart';
      const DELIVERY_FEE = 30;
      const DELIVERY_MINUTES = 45;

      const cartItemsContainer = document.getElementById('cartItems');
      const emptyCart = document.getElementById('emptyCart');
      const cartSummary = document.getElementById('cartSummary');
      const subtotalEl = document.getElementById('subtotal');
      const deliveryFeeEl = document.getElementById('deliveryFee');
      const totalAmountEl = document.getElementById('totalAmount');
      const cartCountEl = document.getElementById('cartCount');
      const mobileCartCountEl = document.getElementById('mobileCartCount');
      const itemCountBadge = document.getElementById('itemCountBadge');
      const toastContainer = document.getElementById('toastContainer');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const checkoutModal = document.getElementById('checkoutModal');
      const checkoutForm = document.getElementById('checkoutForm');
      const cancelCheckoutBtn = document.getElementById('cancelCheckoutBtn');
      const placeOrderBtn = document.getElementById('placeOrderBtn');
      const successModal = document.getElementById('successModal');
      const successOrderId = document.getElementById('successOrderId');
      const deliveryTimeDisplay = document.getElementById('deliveryTimeDisplay');
      const backToHomeBtn = document.getElementById('backToHomeBtn');
      const orderSummaryMini = document.getElementById('orderSummaryMini');

      let supabaseUrl = null, supabaseAnonKey = null;

      // ----- TOAST -----
      function showToast(title, message, icon = '❌') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `
          <div class="toast-icon">${icon}</div>
          <div class="toast-content">
            <div class="toast-title">${title}</div>
            <div class="toast-message">${message}</div>
          </div>
          <button class="toast-close">✕</button>
        `;
        toastContainer.appendChild(toast);

        const closeBtn = toast.querySelector('.toast-close');
        closeBtn.addEventListener('click', () => removeToast(toast));

        setTimeout(() => removeToast(toast), 3500);
      }

      function removeToast(toast) {
        if (toast.classList.contains('removing')) return;
        toast.classList.add('removing');
        setTimeout(() => {
          if (toast.parentElement) toast.remove();
        }, 300);
      }

      // ----- CONFIG -----
      async function getSupabaseConfig() {
        if (supabaseUrl && supabaseAnonKey) return true;
        try {
          const res = await fetch('/api/config');
          if (!res.ok) throw new Error('Config failed');
          const cfg = await res.json();
          supabaseUrl = cfg.supabaseUrl;
          supabaseAnonKey = cfg.supabaseAnonKey;
          return true;
        } catch {
          return false;
        }
      }

      // ----- CART -----
      function getCart() {
        try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch { return []; }
      }
      function saveCart(cart) {
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
        updateCartCount();
      }

      function updateCartCount() {
        const cart = getCart();
        const total = cart.reduce((s, i) => s + i.quantity, 0);
        if (cartCountEl) cartCountEl.textContent = total;
        if (mobileCartCountEl) mobileCartCountEl.textContent = total;
        if (itemCountBadge) itemCountBadge.textContent = total;
      }

      function calculateTotals(cart) {
        const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        return { subtotal, deliveryFee: DELIVERY_FEE, total: subtotal + DELIVERY_FEE };
      }

      // ----- CART ACTIONS -----
      window.increaseQty = function(id) {
        const cart = getCart();
        const item = cart.find(i => i.id === id);
        if (item) { item.quantity += 1; saveCart(cart); renderCart(); }
      };
      window.decreaseQty = function(id) {
        const cart = getCart();
        const item = cart.find(i => i.id === id);
        if (item && item.quantity > 1) { item.quantity -= 1; saveCart(cart); renderCart(); }
      };
      window.removeItem = function(id, title) {
        const el = document.querySelector(`.cart-item[data-id="${id}"]`);
        if (el) el.classList.add('removing');
        setTimeout(() => {
          let cart = getCart();
          cart = cart.filter(i => i.id !== id);
          saveCart(cart);
          renderCart();
          showToast('Removed from cart', title, '🗑️');
        }, 300);
      };

      // ----- RENDER -----
      function renderCart() {
        const cart = getCart();
        updateCartCount();
        if (cart.length === 0) {
          cartItemsContainer.innerHTML = '';
          emptyCart.style.display = 'block';
          cartSummary.style.display = 'none';
          return;
        }
        emptyCart.style.display = 'none';
        cartSummary.style.display = 'block';

        cartItemsContainer.innerHTML = '';
        cart.forEach(item => {
          const el = document.createElement('div');
          el.className = 'cart-item';
          el.setAttribute('data-id', item.id);
          const imgHtml = item.imageUrl
            ? `<img src="${escapeHtml(item.imageUrl)}" class="cart-item-image" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
            : '';
          const placeholder = `<div class="cart-item-placeholder" style="${item.imageUrl ? 'display:none;' : ''}">🥬</div>`;
          const total = (item.price * item.quantity).toFixed(2);
          el.innerHTML = `
            ${imgHtml}${placeholder}
            <div class="cart-item-details">
              <div class="cart-item-title">${escapeHtml(item.title)}</div>
              <div class="cart-item-price">৳${item.price.toFixed(2)}</div>
              <div class="cart-item-controls">
                <button class="qty-btn" onclick="window.decreaseQty(${item.id})" ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
                <span class="qty-display">${item.quantity}</span>
                <button class="qty-btn" onclick="window.increaseQty(${item.id})">+</button>
                <span class="cart-item-total">= ৳${total}</span>
              </div>
            </div>
            <button class="delete-btn" onclick="window.removeItem(${item.id}, '${escapeHtml(item.title)}')">🗑️</button>
          `;
          cartItemsContainer.appendChild(el);
        });

        const totals = calculateTotals(cart);
        subtotalEl.textContent = `৳${totals.subtotal.toFixed(2)}`;
        deliveryFeeEl.textContent = `৳${totals.deliveryFee.toFixed(2)}`;
        totalAmountEl.textContent = `৳${totals.total.toFixed(2)}`;
      }

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // ----- CHECKOUT -----
      function showCheckoutModal() {
        const cart = getCart();
        if (!cart.length) { showToast('Cart is empty!', 'error'); return; }
        const totals = calculateTotals(cart);
        let html = '';
        cart.forEach(i => {
          html += `<div class="row"><span>${escapeHtml(i.title)} × ${i.quantity}</span><span>৳${(i.price * i.quantity).toFixed(2)}</span></div>`;
        });
        html += `<div class="row"><span>Delivery</span><span>৳${DELIVERY_FEE.toFixed(2)}</span></div>`;
        html += `<div class="row total"><span>Total</span><span>৳${totals.total.toFixed(2)}</span></div>`;
        orderSummaryMini.innerHTML = html;
        checkoutModal.style.display = 'flex';
      }

      function hideCheckoutModal() {
        checkoutModal.style.display = 'none';
        checkoutForm.reset();
      }
      cancelCheckoutBtn.addEventListener('click', hideCheckoutModal);
      checkoutModal.addEventListener('click', (e) => {
        if (e.target === checkoutModal) hideCheckoutModal();
      });

      // ----- PLACE ORDER -----
      checkoutForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const cart = getCart();
        if (!cart.length) { showToast('Cart empty', 'error'); return; }
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        if (!name || !phone || !address) { showToast('Please fill all fields', 'error'); return; }
        if (!/^01\d{9}$/.test(phone)) { showToast('Invalid phone (01XXXXXXXXX)', 'error'); return; }

        placeOrderBtn.disabled = true;
        placeOrderBtn.textContent = 'Processing...';

        try {
          const ok = await getSupabaseConfig();
          if (!ok) throw new Error('Config error');
          const totals = calculateTotals(cart);

          const orderRes = await fetch(`${supabaseUrl}/rest/v1/orders`, {
            method: 'POST',
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify({ customer_name: name, customer_phone: phone, customer_address: address, total_price: totals.total, status: 'pending' }),
          });
          if (!orderRes.ok) throw new Error(`Order failed: ${await orderRes.text()}`);
          const [newOrder] = await orderRes.json();
          const orderId = newOrder.id;

          for (const item of cart) {
            await fetch(`${supabaseUrl}/rest/v1/order_items`, {
              method: 'POST',
              headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ order_id: orderId, product_id: item.id, product_title: item.title, product_price: item.price, quantity: item.quantity, product_image_url: item.imageUrl || null }),
            });
          }

          const now = new Date();
          const deliveryDate = new Date(now.getTime() + DELIVERY_MINUTES * 60000);
          const hours = deliveryDate.getHours();
          const minutes = deliveryDate.getMinutes();
          const ampm = hours >= 12 ? 'PM' : 'AM';
          const hour12 = hours % 12 || 12;
          const minStr = minutes.toString().padStart(2, '0');
          const timeString = `${hour12}:${minStr} ${ampm}`;

          localStorage.removeItem(CART_KEY);
          hideCheckoutModal();
          renderCart();
          successOrderId.textContent = `#${orderId}`;
          deliveryTimeDisplay.textContent = timeString;
          successModal.style.display = 'flex';
          showToast('Order placed successfully!', `Order #${orderId}`, '🎉');
        } catch (err) {
          console.error(err);
          showToast('Order failed', 'Please try again', '❌');
        } finally {
          placeOrderBtn.disabled = false;
          placeOrderBtn.textContent = 'Place Order';
        }
      });

      backToHomeBtn.addEventListener('click', () => { window.location.href = '/'; });
      successModal.addEventListener('click', (e) => {
        if (e.target === successModal) window.location.href = '/';
      });
      checkoutBtn.addEventListener('click', showCheckoutModal);

      function init() {
        updateCartCount();
        renderCart();
      }
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
