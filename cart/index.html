<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Cart · Batisha online</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f8f7;
      font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
      color: #1e2b3a;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 70px;
    }

    /* ----- NAVBAR (matches home) ----- */
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #eaeef3;
      padding: 0.7rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.4rem 1.8rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: #1f2a3a;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(145deg, #1e6b3e, #2b7a4a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(30, 107, 62, 0.12);
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
      display: block;
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1f2a3a;
    }
    .logo-text span {
      font-weight: 400;
      color: #4b6b5e;
      font-size: 0.8rem;
      margin-left: 0.1rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      color: #2f3e4e;
      transition: 0.15s;
      letter-spacing: -0.2px;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 2px;
      background: #1f8b4c;
      transition: 0.2s;
    }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a:hover { color: #0f6e3a; }

    .cart-pill {
      background: #f0f5fc;
      padding: 0.3rem 1.1rem 0.3rem 0.9rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1px solid #dde5ed;
      transition: 0.15s;
      color: #1f2a3a;
    }
    .cart-pill:hover {
      background: #e4edf7;
      border-color: #b8cee0;
    }
    .cart-pill span {
      background: #1f8b4c;
      color: white;
      border-radius: 40px;
      padding: 0.02rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 0.2rem;
    }

    /* ----- MAIN ----- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      padding: 0 0.2rem;
    }
    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3428;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .item-count-badge {
      background: #eaf1ec;
      color: #1a3428;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
    }

    /* ----- CART ITEM (mobile-first, card style) ----- */
    .cart-item {
      background: white;
      border-radius: 16px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      border: 1px solid #eef2f6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: all 0.25s ease;
      position: relative;
    }
    .cart-item:active {
      transform: scale(0.99);
    }
    .cart-item.removing {
      opacity: 0;
      transform: translateX(40px);
      transition: 0.3s ease;
    }

    .cart-item-image {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: contain;
      background: #f3f8f5;
      flex-shrink: 0;
      border: 1px solid #e4ece8;
    }
    .cart-item-placeholder {
      width: 72px;
      height: 72px;
      background: #eaf1ec;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #2d7a4b;
      flex-shrink: 0;
      border: 1px solid #e4ece8;
    }

    .cart-item-details {
      flex: 1;
      min-width: 0;
    }
    .cart-item-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1e2e2a;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cart-item-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #0f6e3a;
      margin-top: 0.1rem;
    }
    .cart-item-price::before { content: '৳'; }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
      background: #f5f8f7;
      border-radius: 40px;
      padding: 0.2rem 0.2rem;
      display: inline-flex;
    }
    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: white;
      color: #1f2a3a;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .qty-btn:hover {
      background: #1f8b4c;
      color: white;
    }
    .qty-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      background: #eef2f6;
    }
    .qty-display {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 24px;
      text-align: center;
      color: #1e2e2a;
    }

    .cart-item-total {
      font-weight: 700;
      color: #0f6e3a;
      font-size: 0.85rem;
      margin-left: 0.3rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.3rem;
      border-radius: 50%;
      transition: 0.15s;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .delete-btn:hover {
      opacity: 1;
      color: #dc2626;
      background: rgba(220, 38, 38, 0.06);
    }

    /* ----- CART SUMMARY (clean card) ----- */
    .cart-summary {
      background: white;
      border-radius: 16px;
      padding: 1.2rem 1.2rem 1.4rem;
      margin-top: 0.8rem;
      border: 1px solid #eef2f6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      font-size: 0.9rem;
      color: #2f3e4e;
    }
    .summary-row.delivery {
      color: #1f8b4c;
      font-weight: 500;
    }
    .summary-row.total {
      border-top: 2px solid #f0f5f2;
      margin-top: 0.6rem;
      padding-top: 0.8rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3428;
    }
    .checkout-btn {
      width: 100%;
      background: #1f8b4c;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: 0 2px 10px rgba(31, 139, 76, 0.15);
    }
    .checkout-btn:hover {
      background: #0f6e3a;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(31, 139, 76, 0.2);
    }
    .checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ----- EMPTY STATE ----- */
    .empty-cart {
      text-align: center;
      padding: 3rem 1rem;
    }
    .empty-cart .emoji {
      font-size: 4rem;
      margin-bottom: 0.5rem;
    }
    .empty-cart h2 {
      font-size: 1.1rem;
      color: #1a3428;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .empty-cart p {
      color: #4b5f53;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }
    .continue-shopping-btn {
      background: #1f8b4c;
      color: white;
      padding: 0.6rem 2rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: 0.15s;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.12);
    }
    .continue-shopping-btn:hover {
      background: #0f6e3a;
      transform: scale(1.02);
    }

    /* ----- CHECKOUT MODAL (professional, minimal) ----- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.25s ease;
      padding: 1rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 1.8rem 1.6rem;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
      border: 1px solid #f0f5f2;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }
    .modal-header .icon {
      font-size: 1.6rem;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3428;
    }

    .order-summary-mini {
      background: #f8fbf9;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      font-size: 0.8rem;
      color: #1e2e2a;
      border: 1px solid #eaf1ec;
    }
    .order-summary-mini .row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
    }
    .order-summary-mini .row.total {
      border-top: 1px solid #dce8e2;
      margin-top: 0.4rem;
      padding-top: 0.5rem;
      font-weight: 700;
      color: #0f6e3a;
      font-size: 0.9rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      margin-bottom: 0.9rem;
    }
    .form-group label {
      color: #1a3428;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-input {
      background: #f8fbf9;
      border: 1px solid #e4ece8;
      color: #1e2b3a;
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: 0.15s;
    }
    .form-input:focus {
      border-color: #1f8b4c;
      box-shadow: 0 0 0 3px rgba(31, 139, 76, 0.08);
    }
    textarea.form-input {
      resize: vertical;
      min-height: 60px;
    }

    .modal-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.2rem;
    }
    .btn {
      padding: 0.6rem 1.4rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
      transition: 0.15s;
      flex: 1;
      text-align: center;
    }
    .btn-cancel {
      background: #f3f6f8;
      color: #1f2a3a;
      border: 1px solid #e4eaf0;
    }
    .btn-cancel:hover {
      background: #e8edf2;
    }
    .btn-place-order {
      background: #1f8b4c;
      color: white;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.15);
    }
    .btn-place-order:hover {
      background: #0f6e3a;
    }
    .btn-place-order:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ----- SUCCESS MODAL (clean, app-like) ----- */
    .success-modal .modal-box {
      text-align: center;
      padding: 2rem 1.6rem;
    }
    .success-icon {
      font-size: 3.2rem;
      margin-bottom: 0.2rem;
    }
    .success-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a3428;
      margin-bottom: 0.2rem;
    }
    .success-sub {
      font-size: 0.85rem;
      color: #4b5f53;
      margin-bottom: 0.3rem;
    }
    .order-id-badge {
      background: #eaf1ec;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #0f6e3a;
      display: inline-block;
      margin: 0.4rem 0 0.6rem;
    }
    .delivery-time-box {
      background: #f0f9f2;
      border-radius: 12px;
      padding: 0.8rem;
      margin: 0.8rem 0 1rem;
      border: 1px solid #d4e8dc;
    }
    .delivery-time-box .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #1f8b4c;
      font-weight: 600;
    }
    .delivery-time-box .time {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3428;
      margin-top: 0.1rem;
    }
    .back-btn {
      width: 100%;
      background: #1f8b4c;
      color: white;
      border: none;
      padding: 0.7rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: 0.15s;
      box-shadow: 0 2px 8px rgba(31, 139, 76, 0.12);
    }
    .back-btn:hover {
      background: #0f6e3a;
      transform: translateY(-1px);
    }

    /* ----- TOAST ----- */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 1rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      z-index: 3000;
      display: none;
      animation: slideIn 0.3s ease;
      color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      font-size: 0.85rem;
    }
    .toast.success { background: #1f8b4c; }
    .toast.error { background: #dc2626; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ----- FOOTER (minimal) ----- */
    .footer {
      background: #f8fbf9;
      border-top: 1px solid #e4ece8;
      padding: 0.8rem;
      margin-top: 2.5rem;
      text-align: center;
      height: 20px;
    }
    .footer p { display: none; }

    /* ----- MOBILE BOTTOM NAV ----- */
    .mobile-bottom-nav {
      display: none;
    }

    @media (max-width: 700px) {
      body { padding-bottom: 75px; }
      .nav-links { display: none; }
      .navbar { padding: 0.5rem 1rem; }
      .nav-container { justify-content: flex-start; }

      .mobile-bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid #e4eaf0;
        box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.04);
        justify-content: space-around;
        align-items: center;
        padding: 0.45rem 0 0.6rem;
        z-index: 200;
      }
      .mobile-bottom-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: #2f3e4e;
        font-size: 0.6rem;
        font-weight: 500;
        gap: 0.1rem;
        padding: 0.2rem 0.4rem;
        transition: 0.1s;
        flex: 1;
        max-width: 90px;
        border-radius: 40px;
      }
      .mobile-bottom-nav a:hover {
        color: #0f6e3a;
        background: #f0f8f2;
      }
      .mobile-bottom-nav a .nav-icon {
        font-size: 1.4rem;
        line-height: 1;
      }
      .mobile-bottom-nav a .nav-label {
        font-size: 0.55rem;
        opacity: 0.7;
        letter-spacing: 0.2px;
      }
      .mobile-bottom-nav .nav-home {
        background: #f0f8f2;
        border-radius: 40px;
        padding: 0.3rem 0.6rem;
        margin: 0 0.2rem;
        flex: 1.2;
        max-width: 110px;
      }
      .mobile-bottom-nav .nav-home .nav-icon {
        font-size: 1.6rem;
      }
      .mobile-bottom-nav .nav-home .nav-label {
        font-weight: 600;
        opacity: 0.9;
      }
      .mobile-bottom-nav .cart-badge {
        background: #1f8b4c;
        color: white;
        border-radius: 40px;
        padding: 0.02rem 0.5rem;
        font-size: 0.5rem;
        font-weight: 600;
        margin-left: 0.1rem;
        display: inline-block;
      }

      .cart-item {
        padding: 0.8rem;
        gap: 0.7rem;
      }
      .cart-item-image, .cart-item-placeholder {
        width: 64px;
        height: 64px;
      }
      .container { padding: 0.8rem 0.8rem 1.5rem; }
      .modal-box { padding: 1.5rem 1.2rem; }
      .page-title { font-size: 1.2rem; }
    }

    @media (max-width: 480px) {
      .cart-item { padding: 0.7rem; }
      .cart-item-image, .cart-item-placeholder { width: 56px; height: 56px; }
      .cart-item-title { font-size: 0.8rem; }
      .qty-btn { width: 26px; height: 26px; font-size: 0.8rem; }
      .mobile-bottom-nav a { max-width: 70px; }
      .mobile-bottom-nav .nav-home { max-width: 90px; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR (matches home) -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 10v-2a6 6 0 0 1 12 0v2h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2h4zm2 0h8v-2a4 4 0 0 0-8 0v2zm-2 2v2h2v-2h-2zm4 0v2h4v-2h-4zm8 0v2h2v-2h-2zM8 14v2h2v-2H8zm16 0v2h2v-2h-2zM8 18v8h16v-8H8z"/>
          </svg>
        </div>
        <span class="logo-text">Batisha <span>online</span></span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/product">Products</a>
        <a href="/cart" class="cart-pill">🛒 Cart <span id="cartCount">0</span></a>
      </div>
    </div>
  </nav>

  <!-- MOBILE BOTTOM NAV (home centered) -->
  <div class="mobile-bottom-nav">
    <a href="/product"><span class="nav-icon">📦</span><span class="nav-label">Products</span></a>
    <a href="/" class="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="/cart"><span class="nav-icon">🛒</span><span class="nav-label">Cart <span class="cart-badge" id="mobileCartCount">0</span></span></a>
  </div>

  <!-- MAIN -->
  <main class="container">
    <div class="page-header">
      <h1 class="page-title">🛒 Cart <span class="item-count-badge" id="itemCountBadge">0</span></h1>
    </div>

    <div id="cartItems"></div>

    <div id="emptyCart" class="empty-cart" style="display: none;">
      <div class="emoji">🛒</div>
      <h2>Your cart is empty</h2>
      <p>Looks like you haven't added anything yet!</p>
      <a href="/" class="continue-shopping-btn">🛍️ Continue Shopping</a>
    </div>

    <div id="cartSummary" class="cart-summary" style="display: none;">
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">৳0.00</span></div>
      <div class="summary-row delivery"><span>🚚 Delivery Fee</span><span id="deliveryFee">৳30.00</span></div>
      <div class="summary-row total"><span>Total</span><span id="totalAmount">৳0.00</span></div>
      <button class="checkout-btn" id="checkoutBtn">🛒 Proceed to Checkout</button>
    </div>
  </main>

  <!-- CHECKOUT MODAL (clean, professional) -->
  <div id="checkoutModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-header">
        <span class="icon">📦</span>
        <span class="modal-title">Complete your order</span>
      </div>
      <div class="order-summary-mini" id="orderSummaryMini"></div>
      <form id="checkoutForm">
        <div class="form-group"><label>Full Name *</label><input type="text" id="custName" class="form-input" placeholder="Enter your full name" required></div>
        <div class="form-group"><label>Phone Number *</label><input type="tel" id="custPhone" class="form-input" placeholder="01XXXXXXXXX" required></div>
        <div class="form-group"><label>Delivery Address *</label><textarea id="custAddress" class="form-input" placeholder="House, Road, Area, City" required></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" id="cancelCheckoutBtn">✖ Cancel</button>
          <button type="submit" class="btn btn-place-order" id="placeOrderBtn">✅ Place Order</button>
        </div>
      </form>
    </div>
  </div>

  <!-- SUCCESS MODAL (app-like, with delivery time) -->
  <div id="successModal" class="modal-overlay success-modal" style="display: none;">
    <div class="modal-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Order Confirmed!</div>
      <div class="success-sub">Thank you for your order</div>
      <div class="order-id-badge" id="successOrderId">#0</div>
      <div class="delivery-time-box">
        <div class="label">⏱️ Estimated delivery</div>
        <div class="time" id="deliveryTimeDisplay">—</div>
      </div>
      <button class="back-btn" id="backToHomeBtn">🏠 Back to Home</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- FOOTER (minimal) -->
  <footer class="footer"></footer>

  <script>
    (function() {
      'use strict';

      const CART_KEY = 'grocery_cart';
      const DELIVERY_FEE = 30;
      const DELIVERY_MINUTES = 45;

      const cartItemsContainer = document.getElementById('cartItems');
      const emptyCart = document.getElementById('emptyCart');
      const cartSummary = document.getElementById('cartSummary');
      const subtotalEl = document.getElementById('subtotal');
      const deliveryFeeEl = document.getElementById('deliveryFee');
      const totalAmountEl = document.getElementById('totalAmount');
      const cartCountEl = document.getElementById('cartCount');
      const mobileCartCountEl = document.getElementById('mobileCartCount');
      const itemCountBadge = document.getElementById('itemCountBadge');
      const toast = document.getElementById('toast');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const checkoutModal = document.getElementById('checkoutModal');
      const checkoutForm = document.getElementById('checkoutForm');
      const cancelCheckoutBtn = document.getElementById('cancelCheckoutBtn');
      const placeOrderBtn = document.getElementById('placeOrderBtn');
      const successModal = document.getElementById('successModal');
      const successOrderId = document.getElementById('successOrderId');
      const deliveryTimeDisplay = document.getElementById('deliveryTimeDisplay');
      const backToHomeBtn = document.getElementById('backToHomeBtn');
      const orderSummaryMini = document.getElementById('orderSummaryMini');

      let supabaseUrl = null, supabaseAnonKey = null;

      async function getSupabaseConfig() {
        if (supabaseUrl && supabaseAnonKey) return true;
        try {
          const res = await fetch('/api/config');
          if (!res.ok) throw new Error('Config failed');
          const cfg = await res.json();
          supabaseUrl = cfg.supabaseUrl;
          supabaseAnonKey = cfg.supabaseAnonKey;
          return true;
        } catch { return false; }
      }

      function getCart() {
        try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch { return []; }
      }
      function saveCart(cart) {
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
        updateCartCount();
      }

      function updateCartCount() {
        const cart = getCart();
        const total = cart.reduce((s,i) => s + i.quantity, 0);
        if (cartCountEl) cartCountEl.textContent = total;
        if (mobileCartCountEl) mobileCartCountEl.textContent = total;
        if (itemCountBadge) itemCountBadge.textContent = total;
      }

      function calculateTotals(cart) {
        const subtotal = cart.reduce((s,i) => s + i.price * i.quantity, 0);
        return { subtotal, deliveryFee: DELIVERY_FEE, total: subtotal + DELIVERY_FEE };
      }

      function showToast(msg, type = 'success') {
        toast.textContent = msg;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // Cart actions
      window.increaseQty = function(id) {
        const cart = getCart();
        const item = cart.find(i => i.id === id);
        if (item) { item.quantity += 1; saveCart(cart); renderCart(); }
      };
      window.decreaseQty = function(id) {
        const cart = getCart();
        const item = cart.find(i => i.id === id);
        if (item && item.quantity > 1) { item.quantity -= 1; saveCart(cart); renderCart(); }
      };
      window.removeItem = function(id, title) {
        const el = document.querySelector(`.cart-item[data-id="${id}"]`);
        if (el) el.classList.add('removing');
        setTimeout(() => {
          let cart = getCart();
          cart = cart.filter(i => i.id !== id);
          saveCart(cart);
          renderCart();
          showToast(`🗑️ "${title}" removed`);
        }, 300);
      };

      function renderCart() {
        const cart = getCart();
        updateCartCount();
        if (cart.length === 0) {
          cartItemsContainer.innerHTML = '';
          emptyCart.style.display = 'block';
          cartSummary.style.display = 'none';
          return;
        }
        emptyCart.style.display = 'none';
        cartSummary.style.display = 'block';

        cartItemsContainer.innerHTML = '';
        cart.forEach(item => {
          const el = document.createElement('div');
          el.className = 'cart-item';
          el.setAttribute('data-id', item.id);
          const imgHtml = item.imageUrl 
            ? `<img src="${escapeHtml(item.imageUrl)}" class="cart-item-image" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` 
            : '';
          const placeholder = `<div class="cart-item-placeholder" style="${item.imageUrl ? 'display:none;' : ''}">🥬</div>`;
          const total = (item.price * item.quantity).toFixed(2);
          el.innerHTML = `
            ${imgHtml}${placeholder}
            <div class="cart-item-details">
              <div class="cart-item-title">${escapeHtml(item.title)}</div>
              <div class="cart-item-price">৳${item.price.toFixed(2)}</div>
              <div class="cart-item-controls">
                <button class="qty-btn" onclick="window.decreaseQty(${item.id})" ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
                <span class="qty-display">${item.quantity}</span>
                <button class="qty-btn" onclick="window.increaseQty(${item.id})">+</button>
                <span class="cart-item-total">= ৳${total}</span>
              </div>
            </div>
            <button class="delete-btn" onclick="window.removeItem(${item.id}, '${escapeHtml(item.title)}')">🗑️</button>
          `;
          cartItemsContainer.appendChild(el);
        });

        const totals = calculateTotals(cart);
        subtotalEl.textContent = `৳${totals.subtotal.toFixed(2)}`;
        deliveryFeeEl.textContent = `৳${totals.deliveryFee.toFixed(2)}`;
        totalAmountEl.textContent = `৳${totals.total.toFixed(2)}`;
      }

      // Checkout modal
      function showCheckoutModal() {
        const cart = getCart();
        if (!cart.length) { showToast('Cart is empty!', 'error'); return; }
        const totals = calculateTotals(cart);
        let html = '';
        cart.forEach(i => {
          html += `<div class="row"><span>${escapeHtml(i.title)} × ${i.quantity}</span><span>৳${(i.price * i.quantity).toFixed(2)}</span></div>`;
        });
        html += `<div class="row"><span>🚚 Delivery</span><span>৳${DELIVERY_FEE.toFixed(2)}</span></div>`;
        html += `<div class="row total"><span>Total</span><span>৳${totals.total.toFixed(2)}</span></div>`;
        orderSummaryMini.innerHTML = html;
        checkoutModal.style.display = 'flex';
      }

      function hideCheckoutModal() {
        checkoutModal.style.display = 'none';
        checkoutForm.reset();
      }
      cancelCheckoutBtn.addEventListener('click', hideCheckoutModal);
      checkoutModal.addEventListener('click', (e) => { if (e.target === checkoutModal) hideCheckoutModal(); });

      // Place order with delivery time calculation
      checkoutForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const cart = getCart();
        if (!cart.length) { showToast('Cart empty', 'error'); return; }
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        if (!name || !phone || !address) { showToast('Please fill all fields', 'error'); return; }
        if (!/^01\d{9}$/.test(phone)) { showToast('Invalid phone (01XXXXXXXXX)', 'error'); return; }

        placeOrderBtn.disabled = true;
        placeOrderBtn.textContent = '⏳ Processing...';

        try {
          const ok = await getSupabaseConfig();
          if (!ok) throw new Error('Config error');
          const totals = calculateTotals(cart);

          const orderRes = await fetch(`${supabaseUrl}/rest/v1/orders`, {
            method: 'POST',
            headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify({ customer_name: name, customer_phone: phone, customer_address: address, total_price: totals.total, status: 'pending' }),
          });
          if (!orderRes.ok) throw new Error(`Order failed: ${await orderRes.text()}`);
          const [newOrder] = await orderRes.json();
          const orderId = newOrder.id;

          for (const item of cart) {
            await fetch(`${supabaseUrl}/rest/v1/order_items`, {
              method: 'POST',
              headers: { 'apikey': supabaseAnonKey, 'Authorization': `Bearer ${supabaseAnonKey}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ order_id: orderId, product_id: item.id, product_title: item.title, product_price: item.price, quantity: item.quantity, product_image_url: item.imageUrl || null }),
            });
          }

          // Calculate delivery time (current time + 45 min)
          const now = new Date();
          const deliveryDate = new Date(now.getTime() + DELIVERY_MINUTES * 60000);
          const hours = deliveryDate.getHours();
          const minutes = deliveryDate.getMinutes();
          const ampm = hours >= 12 ? 'PM' : 'AM';
          const hour12 = hours % 12 || 12;
          const minStr = minutes.toString().padStart(2, '0');
          const timeString = `${hour12}:${minStr} ${ampm}`;

          localStorage.removeItem(CART_KEY);
          hideCheckoutModal();
          renderCart();
          successOrderId.textContent = `#${orderId}`;
          deliveryTimeDisplay.textContent = timeString;
          successModal.style.display = 'flex';
        } catch (err) {
          console.error(err);
          showToast('Order failed. Try again.', 'error');
        } finally {
          placeOrderBtn.disabled = false;
          placeOrderBtn.textContent = '✅ Place Order';
        }
      });

      backToHomeBtn.addEventListener('click', () => { window.location.href = '/'; });
      successModal.addEventListener('click', (e) => { if (e.target === successModal) window.location.href = '/'; });
      checkoutBtn.addEventListener('click', showCheckoutModal);

      function init() { updateCartCount(); renderCart(); }
      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
